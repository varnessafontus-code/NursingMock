<script>
var NGN_DATA = [{"type":"bowtie","num":1,"stem":"A nurse is reviewing a fetal monitor strip for a laboring patient at 38 weeks receiving Pitocin. The FHR baseline is 150 bpm. The nurse notes decelerations that begin at the PEAK of each contraction and do not return to baseline until after the contraction has completely ended. Variability is minimal.","action_left":"Actions to take","actions_left":["Stop the Pitocin infusion","Reposition to left lateral","Apply O2 via NRB 8\u201310 L/min","Administer terbutaline 0.25 mg SQ","Increase Pitocin to strengthen contractions"],"correct_actions":["Stop the Pitocin infusion","Reposition to left lateral","Apply O2 via NRB 8\u201310 L/min","Administer terbutaline 0.25 mg SQ"],"condition":"Condition most likely causing this pattern","conditions":["Head compression","Cord compression","Placental insufficiency","Uterine tachysystole","Normal labor response"],"correct_condition":"Placental insufficiency","parameter":"Parameters to monitor","parameters":["FHR variability","Uterine resting tone","Blood pressure","Maternal oxygen saturation","Uterine contraction frequency"],"correct_parameters":["FHR variability","Uterine resting tone","Uterine contraction frequency"],"rationale":"Decelerations that begin after the contraction peak and return after it ends = LATE decelerations (VEAL CHOP: L=Late, P=Placental insufficiency). Combined with minimal variability, this is a non-reassuring pattern requiring full LION PIT. Pitocin must be stopped because it is driving uterine activity that reduces placental perfusion. Increasing Pitocin worsens the situation. Head compression causes early decelerations (mirror the contraction). Cord compression causes variable decelerations (abrupt, V-shaped, unrelated to contraction timing).","chapter":"Chapter 14"},{"type":"emr","num":2,"stem":"A nurse is monitoring a laboring patient. The monitor shows abrupt, V-shaped FHR drops that are unrelated to the timing of contractions. Some drops last 90 seconds. The patient's membranes ruptured 20 minutes ago. Select ALL interventions the nurse should implement.","options":["Reposition patient to left lateral","Perform a vaginal exam","Apply O2 via NRB mask","Increase the Pitocin infusion","Notify the HCP","Perform fetal scalp stimulation during the next deceleration","Stop the Pitocin infusion"],"correct":["Reposition patient to left lateral","Perform a vaginal exam","Apply O2 via NRB mask","Notify the HCP","Stop the Pitocin infusion"],"rationale":"V-shaped, abrupt decelerations unrelated to contractions = variable decelerations = cord compression (VEAL CHOP: V=Variable, C=Cord compression). After ROM, a vaginal exam is required to rule out cord prolapse \u2014 this is the 'I' (Internal exam) in LION PIT. Full LION PIT applies. Fetal scalp stimulation is NEVER performed during a deceleration.","chapter":"Chapter 14"},{"type":"dropdown","num":3,"stem":"A laboring patient's FHR shows a drop below baseline that begins 45 seconds into a contraction and returns to baseline 15 seconds after the contraction ends. This pattern represents [BLANK1] decelerations caused by [BLANK2]. The nurse [BLANK3] need to intervene.","blanks":[{"id":"BLANK1","options":["Early","Late","Variable","Prolonged"],"correct":"Late"},{"id":"BLANK2","options":["head compression","cord compression","placental insufficiency","uterine tachysystole"],"correct":"placental insufficiency"},{"id":"BLANK3","options":["does","does not"],"correct":"does"}],"rationale":"Pattern described begins after the contraction peak and resolves after it ends = Late deceleration = Placental insufficiency. Interventions (LION PIT) are required. Early decelerations mirror the contraction. Variable decelerations are abrupt and V-shaped.","chapter":"Chapter 14"},{"type":"matrix","num":4,"stem":"For each FHR finding, indicate whether it is Reassuring, Non-Reassuring, or Requires Immediate Action.","rows":["FHR baseline 148 bpm with moderate variability and accelerations","FHR baseline 170 bpm sustained \u00d7 15 min with minimal variability","Smooth, gradual decelerations that mirror contractions exactly","V-shaped abrupt deceleration \u00d7 3 min with FHR at 70 bpm","FHR drop below baseline lasting 12 minutes"],"cols":["Reassuring","Non-Reassuring","Requires Immediate Action"],"correct":["Reassuring","Non-Reassuring","Reassuring","Requires Immediate Action","Requires Immediate Action"],"rationale":"Moderate variability + accelerations = intact CNS = reassuring. Tachycardia >160 with minimal variability = non-reassuring (possible hypoxia/infection). Early decelerations mirror contractions = head compression = benign. Variable decel lasting 3 min = prolonged deceleration territory + cord compression = immediate action. A drop > 10 min is a BASELINE CHANGE \u2014 even more urgent.","chapter":"Chapter 14"},{"type":"highlight","num":5,"stem":"A nurse reviews the following documentation: 'FHR 152 bpm, moderate variability, accelerations \u00d7 2 in 20 min. Contraction every 7 min lasting 60 sec. Amniotic fluid clear. Patient requests pain medication. No decelerations noted.' Select ALL findings the nurse should highlight as NORMAL and REASSURING.","sentences":["FHR 152 bpm","Moderate variability","Accelerations \u00d7 2 in 20 min","Contraction every 7 min","Amniotic fluid clear","No decelerations noted"],"correct":["FHR 152 bpm","Moderate variability","Accelerations \u00d7 2 in 20 min","Amniotic fluid clear","No decelerations noted"],"rationale":"FHR 152 = within 110\u2013160 normal range. Moderate variability (6\u201325 bpm) = most reassuring type. Accelerations (\u226515 bpm, \u226515 sec) = sign of fetal well-being/intact CNS. Clear amniotic fluid = normal. No decelerations = reassuring. Contractions q7 min is infrequent but not itself a FHR finding \u2014 it is not a reassuring FHR parameter per se.","chapter":"Chapter 14"},{"type":"emr","num":6,"stem":"A nurse observes that the FHR variability has changed from moderate (12 bpm) to minimal (3 bpm) over the last 30 minutes. The patient received IV morphine 45 minutes ago. The FHR baseline remains 138 bpm with no decelerations. Select ALL appropriate nursing actions.","options":["Document the finding and continue monitoring","Perform fetal scalp stimulation","Apply O2 via NRB and reposition","Notify the HCP immediately of urgent fetal compromise","Consider medication as possible cause and document","Initiate LION PIT interventions"],"correct":["Document the finding and continue monitoring","Consider medication as possible cause and document"],"rationale":"Minimal variability (\u22645 bpm) after morphine administration is expected \u2014 narcotics suppress the fetal CNS temporarily. This is a KNOWN cause of minimal variability in the absence of other concerning signs (no decelerations, baseline WNL). The correct action is to document, monitor, consider the medication as the cause, and allow time for the drug to clear. LION PIT is not indicated with no decelerations and a known pharmacologic cause. Fetal scalp stimulation is NOT appropriate during decelerations (none present here, so it could be considered, but the most appropriate answer given context is watchful documentation).","chapter":"Chapter 14"},{"type":"order","num":7,"stem":"A nurse notes late decelerations and the patient is receiving Pitocin. Place the following LION PIT interventions in the correct priority order (1 = first action).","items":["Stop the Pitocin infusion","Apply O2 via NRB mask at 8\u201310 L/min","Reposition patient to left lateral","Notify the HCP","Perform vaginal exam to rule out cord prolapse","Administer terbutaline 0.25 mg SQ"],"correct_order":["Reposition patient to left lateral","Stop the Pitocin infusion","Apply O2 via NRB mask at 8\u201310 L/min","Notify the HCP","Perform vaginal exam to rule out cord prolapse","Administer terbutaline 0.25 mg SQ"],"rationale":"LION PIT in order: L=Left side (reposition), I=Increase IV, O=Oxygenate, N=Notify HCP, P=Pitocin OFF, I=Internal exam, T=Tocolytic. Repositioning is the fastest intervention requiring no equipment. Stopping Pitocin removes the causative agent. O2 and notifying HCP follow. Vaginal exam rules out cord prolapse (especially important for variables). Terbutaline is given last as a pharmacologic tocolytic.","chapter":"Chapter 14"},{"type":"emr","num":8,"stem":"A nurse is setting up fetal monitoring for a patient who is 5 cm dilated with ruptured membranes. The provider wants accurate contraction intensity measurements and the ability to perform amnioinfusion for meconium-stained fluid. Which actions are appropriate? Select ALL that apply.","options":["Apply external TOCO over the fundus","Insert an IUPC","Insert a Fetal Spiral Electrode (FSE)","Use the external EFM only","Prepare for amnioinfusion through IUPC","Verify membranes are ruptured before inserting internal monitors"],"correct":["Insert an IUPC","Insert a Fetal Spiral Electrode (FSE)","Prepare for amnioinfusion through IUPC","Verify membranes are ruptured before inserting internal monitors"],"rationale":"IUPC is the ONLY accurate measure of contraction intensity AND is the device through which amnioinfusion is performed. FSE provides accurate FHR monitoring internally. Both require ROM and dilation (both present here). External TOCO cannot measure intensity accurately. Verifying ROM before internal monitor insertion is a required nursing step.","chapter":"Chapter 14"},{"type":"dropdown","num":9,"stem":"A preterm fetus at 31 weeks has a FHR baseline of 165 bpm. The mother is afebrile and has not received any medications. The nurse should [BLANK1] because baseline tachycardia in a preterm fetus [BLANK2].","blanks":[{"id":"BLANK1","options":["notify the HCP immediately of pathologic tachycardia","document and continue monitoring","initiate LION PIT","prepare for emergency cesarean"],"correct":"document and continue monitoring"},{"id":"BLANK2","options":["indicates severe fetal hypoxia","is normal","indicates cord compression","requires corticosteroid administration"],"correct":"is normal"}],"rationale":"The slides explicitly state: 'Baseline tachycardia is normal for a preterm fetus.' A FHR of 165 bpm in a 31-week fetus without other risk factors (afebrile, no meds) is expected. Emergency response would be inappropriate and potentially harmful. This distinguishes pathologic tachycardia in a term fetus from the expected physiology of prematurity.","chapter":"Chapter 14"},{"type":"matrix","num":10,"stem":"Match each deceleration type with ALL characteristics that apply.","rows":["Uniform shape, mirrors contraction, gradual onset","Abrupt onset and return, V-shaped, not time-related to contractions","Occurs after the contraction peak, returns after contraction ends","Drop below baseline lasting 4 minutes"],"cols":["Head compression","Cord compression","Placental insufficiency","Interruption of O2"],"correct":["Head compression","Cord compression","Placental insufficiency","Interruption of O2"],"rationale":"Uniform, mirrors contraction = EARLY decel = head compression. Abrupt, V-shaped, not time-related = VARIABLE decel = cord compression. After peak, returns after ctx = LATE decel = placental insufficiency. Drop lasting 4 min (2\u201310 min range) = PROLONGED decel = interruption of O2 to fetus.","chapter":"Chapter 14"},{"type":"emr","num":11,"stem":"The nurse should NOT perform fetal scalp stimulation in which of the following situations? Select ALL that apply.","options":["During an active deceleration","When the FHR shows moderate variability with no decelerations","During a prolonged deceleration lasting 3 minutes","When accelerations are absent for 20 minutes","When the patient just received an epidural"],"correct":["During an active deceleration","During a prolonged deceleration lasting 3 minutes"],"rationale":"Fetal scalp stimulation must NEVER be performed during any type of deceleration \u2014 early, late, variable, or prolonged. The fetus is already under physiologic stress during a deceleration and stimulation will not produce a reliable response. It is appropriate to perform scalp stimulation when there are no spontaneous accelerations and the strip otherwise appears non-distressed (no active decelerations).","chapter":"Chapter 14"},{"type":"highlight","num":12,"stem":"A nurse reads the following nursing note: 'Patient at 39 weeks. FHR 158 bpm, variability 3 bpm, no accelerations \u00d7 40 min. Late decelerations \u00d7 4 in past 30 min. Patient on Pitocin 6 mU/min. Contractions q2 min \u00d7 80 sec. Resting tone firm on palpation.' Select ALL findings that are ABNORMAL and require intervention.","sentences":["FHR 158 bpm","Variability 3 bpm","No accelerations \u00d7 40 min","Late decelerations \u00d7 4 in past 30 min","Contractions q2 min \u00d7 80 sec","Resting tone firm on palpation"],"correct":["Variability 3 bpm","No accelerations \u00d7 40 min","Late decelerations \u00d7 4 in past 30 min","Resting tone firm on palpation"],"rationale":"FHR 158 = within normal (110\u2013160). Variability 3 bpm = MINIMAL (\u22645 bpm) = abnormal. No accelerations \u00d7 40 min = concerning for fetal well-being (though not absolute criterion alone). Late decelerations \u00d7 4 = placental insufficiency pattern = non-reassuring = intervene. Contractions q2 min \u00d7 80 sec = within normal if < 5/10 min; but firm resting tone = tachysystole criterion \u2014 ABNORMAL, intervene.","chapter":"Chapter 14"},{"type":"dropdown","num":13,"stem":"A laboring patient's external monitor is showing poor tracing quality due to maternal obesity. The provider orders internal monitoring. The nurse explains that the Fetal Spiral Electrode (FSE) is contraindicated because the patient has [BLANK1]. The nurse also knows that before inserting any internal monitor, [BLANK2] must be confirmed.","blanks":[{"id":"BLANK1","options":["gestational diabetes","active herpes lesions","a reactive NST","minimal variability"],"correct":"active herpes lesions"},{"id":"BLANK2","options":["the patient is at least 6 cm dilated","membranes are ruptured and cervix is dilated","the fetal head is at +2 station","a reassuring FHR pattern is established"],"correct":"membranes are ruptured and cervix is dilated"}],"rationale":"FSE contraindications include: active herpes lesions, HIV, hepatitis, unidentifiable presenting part, placenta previa, hemophilia. Both internal monitors (FSE and IUPC) require ROM AND cervical dilation. Station and FHR pattern are not prerequisites for internal monitor insertion.","chapter":"Chapter 14"},{"type":"order","num":14,"stem":"Following spontaneous rupture of membranes, place the following nursing assessments in the CORRECT priority order (1 = first).","items":["Assess FHR","Document time and characteristics of amniotic fluid","Notify the HCP","Assess maternal vital signs","Perform vaginal exam if FHR is abnormal"],"correct_order":["Assess FHR","Document time and characteristics of amniotic fluid","Perform vaginal exam if FHR is abnormal","Assess maternal vital signs","Notify the HCP"],"rationale":"The slides state: 'After ROM always check FHR FIRST due to possible cord prolapse.' Cord prolapse with compression presents as sudden bradycardia or variable decelerations immediately after ROM. Documentation and assessment of fluid characteristics follow. Vaginal exam is performed if FHR is abnormal to rule out cord prolapse. VS and notifying HCP come after immediate fetal safety is confirmed.","chapter":"Chapter 14"},{"type":"emr","num":15,"stem":"A nurse reads a fetal monitor strip and identifies the following: baseline 142 bpm, variability 18 bpm, 3 accelerations in 20 minutes reaching 160 bpm and lasting 20 seconds, no decelerations. Select ALL correct interpretations.","options":["This is a reassuring strip requiring no intervention","Variability is minimal and concerning","Accelerations meet the definition of reassuring","The FHR baseline is within normal limits","This strip indicates placental insufficiency","Fetal scalp stimulation should be performed to improve variability"],"correct":["This is a reassuring strip requiring no intervention","Accelerations meet the definition of reassuring","The FHR baseline is within normal limits"],"rationale":"FHR 142 = normal (110\u2013160). Variability 18 bpm = MODERATE (6\u201325 bpm) = most reassuring type. Accelerations \u226515 bpm above baseline lasting \u226515 sec = meet definition and are signs of fetal well-being. No decelerations. This is a fully reassuring strip. No placental insufficiency (that would be late decelerations). Fetal scalp stimulation is not needed when spontaneous accelerations are already present.","chapter":"Chapter 14"},{"type":"emr","num":1,"stem":"A patient is 8 cm dilated and reports an overwhelming urge to push. Select ALL correct nursing responses.","options":["Encourage the patient to push gently with the next contraction since she is nearly complete","Instruct the patient to breathe through contractions using panting or blowing techniques","Explain that pushing before 10 cm causes cervical edema and injury","Perform a vaginal exam to determine current dilation","Administer oxytocin to speed dilation to 10 cm","Call the HCP to reassess cervical dilation"],"correct":["Instruct the patient to breathe through contractions using panting or blowing techniques","Explain that pushing before 10 cm causes cervical edema and injury","Perform a vaginal exam to determine current dilation"],"rationale":"The slides state: 'Instruct not to push if not fully dilated to prevent cervical edema and injury.' The nurse must reassess dilation (she may now be complete), coach the patient to breathe through contractions to resist the urge, and explain the rationale. Allowing premature pushing, administering oxytocin, or calling the HCP without first assessing the situation are incorrect priorities.","chapter":"Chapter 15"},{"type":"bowtie","num":2,"stem":"A nurse is caring for a patient who just had AROM performed. The fetal head was at -1 station. Two minutes after the procedure, the nurse notes a sudden FHR drop to 72 bpm.","action_left":"Priority actions","actions_left":["Insert gloved hand to elevate presenting part off cord","Apply O2 via nasal cannula","Reposition to knee-chest or Trendelenburg","Increase IV fluid rate","Perform fundal massage"],"correct_actions":["Insert gloved hand to elevate presenting part off cord","Reposition to knee-chest or Trendelenburg"],"condition":"Most likely complication","conditions":["Placental abruption","Cord prolapse","Uterine rupture","Chorioamnionitis","Uterine atony"],"correct_condition":"Cord prolapse","parameter":"Assessment parameters to monitor","parameters":["FHR continuously","Maternal blood pressure","Urine output","Contraction pattern","Maternal temperature"],"correct_parameters":["FHR continuously","Contraction pattern"],"rationale":"High fetal station (-1) at time of AROM + sudden bradycardia = cord prolapse until proven otherwise. This is the greatest risk of AROM when the presenting part is not well engaged. Priority: manual elevation of presenting part + knee-chest/Trendelenburg to relieve cord compression while preparing for emergency c-section. Fundal massage is for uterine atony. O2 via nasal cannula provides inadequate flow \u2014 NRB is needed if O2 is given.","chapter":"Chapter 15"},{"type":"dropdown","num":3,"stem":"A nurse is preparing to administer Cervidil (dinoprostone) for cervical ripening. The nurse should instruct the patient to remain [BLANK1] for [BLANK2] after insertion. If the patient develops more than 5 contractions in 10 minutes, the nurse should [BLANK3].","blanks":[{"id":"BLANK1","options":["ambulatory","recumbent (lying down)","in a left lateral position only","sitting upright"],"correct":"recumbent (lying down)"},{"id":"BLANK2","options":["15 minutes","30 minutes","1 hour","2 hours"],"correct":"30 minutes"},{"id":"BLANK3","options":["increase the IV fluid rate","remove the Cervidil insert","notify the HCP and continue monitoring","administer calcium gluconate"],"correct":"remove the Cervidil insert"}],"rationale":"Cervidil protocol: patient recumbent for 30 min after insertion. Remove at active labor onset OR if tachysystole (>5 ctx/10 min) develops. Tachysystole is the primary adverse effect of prostaglandin cervical ripening agents. This is directly from the slides.","chapter":"Chapter 15"},{"type":"matrix","num":4,"stem":"For each clinical scenario, indicate whether Misoprostol (Cytotec) is Indicated, Contraindicated, or Requires Caution.","rows":["Patient at 41 weeks with Bishop score of 4, no prior uterine surgery","Patient with prior low transverse cesarean section","Patient with gestational hypertension at 39 weeks needing induction","Patient with active genital herpes at 38 weeks","Patient with PPROM at 34 weeks, no prior uterine surgery"],"cols":["Indicated","Contraindicated","Requires Caution"],"correct":["Indicated","Contraindicated","Requires Caution","Contraindicated","Requires Caution"],"rationale":"Cytotec is CONTRAINDICATED with previous c-section or major uterine surgery (rupture risk). Active herpes is a contraindication to vaginal delivery/induction. HTN is an indication. PPROM requires caution (weigh infection risk vs. prematurity). Post-term with low Bishop score = indicated.","chapter":"Chapter 15"},{"type":"emr","num":5,"stem":"A nurse is initiating an oxytocin (Pitocin) infusion for labor induction. Select ALL actions that are correct.","options":["Dilute Pitocin in an isotonic IV solution","Run Pitocin as the primary IV infusion","Connect the Pitocin infusion at the port closest to the IV insertion site","Start at 1 mU/min and increase every 30 minutes","Continue increasing the rate until contractions are every 1 minute","Stop increasing the dose once contractions are q2\u20133 min","Monitor FHR and uterine activity continuously"],"correct":["Dilute Pitocin in an isotonic IV solution","Connect the Pitocin infusion at the port closest to the IV insertion site","Start at 1 mU/min and increase every 30 minutes","Stop increasing the dose once contractions are q2\u20133 min","Monitor FHR and uterine activity continuously"],"rationale":"Pitocin must be: diluted in isotonic solution (hypotonic \u2192 water intoxication risk), run as SECONDARY (piggyback) infusion, connected at the port CLOSEST to IV site (for rapid discontinuation), started at 1 mU/min and increased q30 min, STOPPED INCREASING once ctx q2\u20133 min. Goal is ctx q2\u20133 min \u2014 increasing until q1 min = tachysystole. Continuous FHR and UA monitoring is mandatory.","chapter":"Chapter 15"},{"type":"highlight","num":6,"stem":"A nurse is documenting a patient's amniotic fluid after SROM. The nurse notes: 'Large gush of fluid at 1420. Fluid is greenish-brown, thick consistency, no odor noted. FHR 144 bpm with moderate variability. No decelerations.' Select ALL findings that require immediate nursing action.","sentences":["Large gush of fluid","Fluid is greenish-brown, thick consistency","No odor noted","FHR 144 bpm with moderate variability","No decelerations"],"correct":["Fluid is greenish-brown, thick consistency"],"rationale":"Green/brown thick fluid = meconium (baby's first bowel movement in utero). This is potentially a sign of fetal hypoxia. Required actions: check EFM (done \u2014 reassuring), give O2 if signs of hypoxia present, notify HCP, document. The HCP may order amnioinfusion to dilute the meconium. The FHR is reassuring, so emergency c-section is not indicated. 'Large gush' is expected after ROM \u2014 not concerning on its own.","chapter":"Chapter 15"},{"type":"emr","num":7,"stem":"A nurse is caring for a patient 26 hours after spontaneous ROM at 38 weeks. The patient's temperature is 101.2\u00b0F, FHR is 178 bpm, and the uterus is tender to palpation. The amniotic fluid is cloudy with a foul odor. Select ALL expected provider orders the nurse should anticipate.","options":["Ampicillin IV","Gentamicin IV","Cervidil for cervical ripening","Betamethasone IM","Delivery of the fetus","Blood cultures","Restrict oral fluid intake"],"correct":["Ampicillin IV","Gentamicin IV","Delivery of the fetus","Blood cultures"],"rationale":"This is chorioamnionitis: fever + maternal AND fetal tachycardia + tender uterus + foul/cloudy fluid + prolonged ROM (>24 hrs). Management: DELIVERY + broad-spectrum antibiotics (Ampicillin + Gentamicin IV started in labor). Blood cultures may be ordered before antibiotics. Betamethasone is for preterm lung maturity (38 weeks = term). Cervidil is for cervical ripening \u2014 provider may order induction agents separately but Cervidil is not the antibiotic.","chapter":"Chapter 15"},{"type":"order","num":8,"stem":"A nurse is preparing a patient for an External Cephalic Version (ECV). Place the following pre-procedure steps in the correct order (1 = first).","items":["Perform/confirm reactive NST","Confirm gestational age \u2265 37 weeks","Administer tocolytic to relax uterus","Use ultrasound to guide the procedure","Administer RhoGAM if patient is Rh-negative"],"correct_order":["Confirm gestational age \u2265 37 weeks","Perform/confirm reactive NST","Administer RhoGAM if patient is Rh-negative","Administer tocolytic to relax uterus","Use ultrasound to guide the procedure"],"rationale":"ECV sequence: confirm \u226537 weeks GA first (contraindicated if preterm), reactive NST required to confirm fetal well-being before procedure, RhoGAM administered if Rh-negative (risk of fetal blood entering maternal circulation), tocolytic relaxes the uterus for manipulation, ultrasound guides the actual procedure throughout.","chapter":"Chapter 15"},{"type":"matrix","num":9,"stem":"A nurse is caring for a patient after vacuum-assisted delivery. Match each neonatal scalp finding with its correct characteristics.","rows":["Swelling present at birth, crosses suture lines, no hemodynamic changes","Does NOT cross suture lines, develops post-delivery, may cause hyperbilirubinemia","Crosses suture lines, expands rapidly post-delivery, causes hemodynamic instability"],"cols":["Caput succedaneum","Cephalohematoma","Subgaleal hemorrhage"],"correct":["Caput succedaneum","Cephalohematoma","Subgaleal hemorrhage"],"rationale":"Caput succedaneum: present at birth, crosses suture lines, benign, no blood vessel rupture. Cephalohematoma: does NOT cross suture lines, develops hours after birth due to subperiosteal bleeding, risk of hyperbilirubinemia. Subgaleal hemorrhage: crosses suture lines, EXPANDS RAPIDLY, risk of hemorrhagic shock = EMERGENCY. The key differentiator: only subgaleal causes hemodynamic compromise.","chapter":"Chapter 15"},{"type":"emr","num":10,"stem":"A nurse is preparing a patient for cesarean birth. The provider calls a time-out. Select ALL components that must be verified during a surgical time-out.","options":["Correct patient identity","Correct surgical procedure","Correct surgical site","All team members introduce themselves and their role","Patient's birth plan preferences","Consent forms have been signed","Newborn resuscitation equipment is ready"],"correct":["Correct patient identity","Correct surgical procedure","Correct surgical site","All team members introduce themselves and their role","Consent forms have been signed"],"rationale":"Time-out per the slides: 'All members of the team validate correct patient, correct procedure, correct site, and consents. Healthcare team identifies themselves and their role.' This is a mandatory safety precaution. Birth plan preferences and resuscitation equipment are important but are not components of the surgical time-out itself.","chapter":"Chapter 15"},{"type":"dropdown","num":11,"stem":"A patient had a previous classical uterine incision with her first cesarean. For her current pregnancy at 38 weeks, the nurse knows that [BLANK1] is contraindicated, and [BLANK2] for future births is required because [BLANK3].","blanks":[{"id":"BLANK1","options":["epidural anesthesia","trial of labor (VBAC) and induction","external cephalic version","oxytocin augmentation only"],"correct":"trial of labor (VBAC) and induction"},{"id":"BLANK2","options":["induction with misoprostol","planned cesarean","vaginal birth with continuous EFM","expectant management"],"correct":"planned cesarean"},{"id":"BLANK3","options":["the classical incision is in the lower uterine segment","the classical incision carries the highest risk of uterine rupture","induction is only contraindicated after 3 cesareans","VBAC is allowed if more than 2 years have passed"],"correct":"the classical incision carries the highest risk of uterine rupture"}],"rationale":"Classical incision = through the uterine body (highest contractile force area). This carries the HIGHEST rupture risk in subsequent labor. BOTH VBAC and induction/augmentation are permanently contraindicated. All future deliveries must be planned cesareans. Low Uterine Transverse (LUT) incision allows VBAC consideration.","chapter":"Chapter 15"},{"type":"highlight","num":12,"stem":"A nurse reviews an admission assessment for a patient in active labor. 'G3P2, 38 weeks, contractions q3min \u00d7 60sec, cervix 7 cm/90%/-1, membranes intact, FHR 148 with moderate variability. Patient requests epidural. Last oral intake 6 hours ago (light meal). IV access: 18 gauge peripheral in left forearm.' Select ALL findings the nurse should flag as important considerations BEFORE epidural placement.","sentences":["G3P2","38 weeks","Contractions q3min \u00d7 60sec","Cervix 7 cm/90%/-1","Membranes intact","FHR 148 with moderate variability","Patient requests epidural","Last oral intake 6 hours ago (light meal)","IV access: 18 gauge peripheral"],"correct":["Cervix 7 cm/90%/-1","IV access: 18 gauge peripheral"],"rationale":"At 7 cm, delivery may be imminent \u2014 especially in a G3P2 (grand multipara). Epidural placement takes time; the nurse should assess whether there is adequate time for epidural placement and assess labor progress. IV access at 18 gauge is appropriate (adequate for epidural preload bolus of 500\u20131000cc LR). Nothing else flags a contraindication. NPO status, FHR, and contraction pattern are all acceptable.","chapter":"Chapter 15"},{"type":"emr","num":13,"stem":"A patient develops water intoxication after prolonged oxytocin infusion at 22 mU/min in a hypotonic IV solution. Select ALL expected clinical findings.","options":["Headache","Increased blood pressure","Decreased pulse","Blurred vision","Pulmonary crackles and wheezing","Tachycardia","Increased urine output"],"correct":["Headache","Increased blood pressure","Decreased pulse","Blurred vision","Pulmonary crackles and wheezing"],"rationale":"Water intoxication (dilutional hyponatremia) from oxytocin: oxytocin has antidiuretic properties. Signs: headache, blurred vision, behavioral changes, INCREASED BP, DECREASED pulse (vagal response to fluid overload), crackles/wheezing (pulmonary edema). NOT tachycardia (pulse decreases). NOT increased urine output (antidiuretic effect \u2192 oliguria). This is why Pitocin must be in isotonic solution at rates \u226420 mU/min.","chapter":"Chapter 15"},{"type":"bowtie","num":14,"stem":"A patient in the second stage of labor delivers the fetal head but then the head retracts back against the perineum. The nurse recognizes the turtle sign.","action_left":"Priority actions","actions_left":["Call for help immediately","Stop maternal pushing","Apply suprapubic pressure","Perform McRoberts maneuver","Apply fundal pressure","Prepare for emergency c-section"],"correct_actions":["Call for help immediately","Stop maternal pushing","Apply suprapubic pressure","Perform McRoberts maneuver"],"condition":"Condition present","conditions":["Uterine rupture","Shoulder dystocia","Cord prolapse","Placental abruption","Normal crowning"],"correct_condition":"Shoulder dystocia","parameter":"Post-delivery neonatal assessments","parameters":["Clavicle or humerus fracture","Erb's palsy (brachial plexus injury)","Subgaleal hemorrhage","Neonatal hypoxia","Jaundice at 24 hours"],"correct_parameters":["Clavicle or humerus fracture","Erb's palsy (brachial plexus injury)","Neonatal hypoxia"],"rationale":"Turtle sign = shoulder dystocia = OB emergency. Immediate: call for help + STOP pushing (pushing worsens impaction). First-line intervention = McRoberts maneuver (hyperflex thighs against abdomen). Suprapubic pressure is applied simultaneously. Fundal pressure is CONTRAINDICATED \u2014 it worsens shoulder impaction. Post-delivery: assess for clavicle/humerus fracture, Erb's palsy (brachial plexus), hypoxia from cord compression.","chapter":"Chapter 15"},{"type":"emr","num":15,"stem":"A nurse is teaching a nulliparous patient in the active phase of labor how to push effectively in the second stage. Select ALL correct teaching points.","options":["Begin pushing as soon as you feel any urge, even between contractions","Start pushing only when a contraction begins","Take a cleansing breath at the start of each contraction","Curl your chin to your chest and push as if having a bowel movement","Push for 6\u20138 seconds at a time","Continue pushing between contractions to maintain progress","Consider squatting \u2014 it is the most effective position for pushing","Rest completely and conserve energy between contractions"],"correct":["Start pushing only when a contraction begins","Take a cleansing breath at the start of each contraction","Curl your chin to your chest and push as if having a bowel movement","Push for 6\u20138 seconds at a time","Consider squatting \u2014 it is the most effective position for pushing","Rest completely and conserve energy between contractions"],"rationale":"Proper pushing technique from the slides: push WITH contractions (not between), cleansing breath at start, chin to chest/curl around baby, push 6\u20138 sec, repeat during contraction, REST between contractions. Squatting is the most effective position. Pushing between contractions wastes energy and is not effective. Upright positions are preferred over supine.","chapter":"Chapter 15"},{"type":"bowtie","num":1,"stem":"A patient at 30 weeks gestation is receiving magnesium sulfate for preterm labor. The nurse assesses: respiratory rate 10 breaths/min, absent deep tendon reflexes, urine output 20 mL/hr for the past hour.","action_left":"Priority nursing actions","actions_left":["Stop the magnesium sulfate infusion","Administer calcium gluconate","Administer terbutaline 0.25 mg SQ","Increase the IV fluid rate","Notify the HCP","Continue and monitor closely"],"correct_actions":["Stop the magnesium sulfate infusion","Administer calcium gluconate","Notify the HCP"],"condition":"Condition occurring","conditions":["Therapeutic magnesium level achieved","Magnesium sulfate toxicity","Preterm labor progression","Uterine tachysystole","Normal preterm labor response"],"correct_condition":"Magnesium sulfate toxicity","parameter":"Parameters that indicate toxicity","parameters":["RR < 12 breaths/min","Absent deep tendon reflexes","UO < 30 mL/hr","Maternal heart rate > 120 bpm","Fetal tachycardia"],"correct_parameters":["RR < 12 breaths/min","Absent deep tendon reflexes","UO < 30 mL/hr"],"rationale":"All three findings exceed the toxicity thresholds: RR must be \u226512 (10 = below), absent DTRs (loss of DTRs is early toxicity sign), UO must be \u226530 mL/hr (20 = below). STOP infusion + administer calcium gluconate (antidote) immediately + notify HCP. Terbutaline does not reverse magnesium toxicity. Continuing to monitor without intervention risks respiratory arrest.","chapter":"Chapter 16"},{"type":"emr","num":2,"stem":"A nurse is caring for a patient in preterm labor at 31 weeks. The provider orders terbutaline (Brethine) 0.25 mg SQ. Before administering, the nurse assesses a maternal HR of 126 bpm and bilateral wet lung sounds. Select ALL correct nursing actions.","options":["Administer the medication as ordered","Hold the medication and notify the provider","Document expected side effects and administer","Assess oxygen saturation","Apply O2 via NRB mask","Prepare calcium gluconate at the bedside"],"correct":["Hold the medication and notify the provider","Assess oxygen saturation","Apply O2 via NRB mask"],"rationale":"HR >120 bpm = HOLD terbutaline (threshold from the slides). Wet lung sounds = pulmonary edema = sign of toxicity = DISCONTINUE (not just hold, but notify immediately). These are signs that terbutaline is causing cardiovascular compromise. Assess O2 sat and apply O2. Calcium gluconate is the antidote for MAGNESIUM toxicity, not terbutaline. Never administer terbutaline when these signs are present.","chapter":"Chapter 16"},{"type":"dropdown","num":3,"stem":"A patient at 32 weeks is at risk for preterm delivery. The provider orders betamethasone. The nurse explains that the primary purpose of this medication is to [BLANK1], and maximum benefit is achieved when delivery occurs [BLANK2] after the course is completed. The nurse knows that [BLANK3] is NOT a purpose of corticosteroids in this situation.","blanks":[{"id":"BLANK1","options":["stop preterm contractions","accelerate fetal lung maturity and reduce risk of RDS","prevent intrauterine infection","provide neuroprotection for the fetus"],"correct":"accelerate fetal lung maturity and reduce risk of RDS"},{"id":"BLANK2","options":["immediately","at least 12 hours","at least 24 hours","at least 48 hours"],"correct":"at least 24 hours"},{"id":"BLANK3","options":["accelerating surfactant production","reducing risk of respiratory distress syndrome","stopping uterine contractions","reducing risk of intraventricular hemorrhage"],"correct":"stopping uterine contractions"}],"rationale":"Betamethasone/dexamethasone = corticosteroids = accelerate lung maturity + reduce RDS risk. Maximum benefit: delivery \u226524 hrs after COMPLETION of both doses. They do NOT stop contractions \u2014 that is the tocolytics' role. Students commonly confuse: betamethasone = lungs, magnesium sulfate = neuroprotection, terbutaline/nifedipine/indomethacin = stop contractions.","chapter":"Chapter 16"},{"type":"matrix","num":4,"stem":"For each tocolytic drug, match it to its primary mechanism of action AND its key nursing concern.","rows":["Magnesium Sulfate","Terbutaline (Brethine)","Nifedipine (Procardia)","Indomethacin (Indocin)"],"cols":["Neuroprotection/calcium antagonism","Beta-adrenergic \u2014 relaxes smooth muscle","Calcium channel blocker","Prostaglandin inhibitor"],"correct":["Neuroprotection/calcium antagonism","Beta-adrenergic \u2014 relaxes smooth muscle","Calcium channel blocker","Prostaglandin inhibitor"],"rationale":"MgSO4 = primary goal is neuroprotection; also short-term tocolytic. Terbutaline = beta-adrenergic drug \u2192 relaxes uterine smooth muscle. Nifedipine = calcium channel blocker (calcium needed for muscle contraction \u2014 blocking it stops ctx). Indomethacin = prostaglandin synthesis inhibitor. Key concerns: MgSO4 \u2192 toxicity (RR, DTRs, UO); Terbutaline \u2192 HR >120, wet lungs; Nifedipine \u2192 postural HTN, headache; Indomethacin \u2192 fetal ductus arteriosus constriction, oligohydramnios.","chapter":"Chapter 16"},{"type":"emr","num":5,"stem":"A patient presents at 28 weeks with regular contractions, pelvic pressure, and low back pain. A fetal fibronectin (fFN) test is ordered. Select ALL statements about fFN that are correct.","options":["A negative fFN result reliably predicts preterm birth will NOT occur in the next 1\u20132 weeks","A positive fFN result confirms preterm birth is imminent","The test should not be performed if the patient had intercourse within the last 48 hours","The test should not be performed if vaginal bleeding is present","fFN is most valuable as a positive predictor","fFN is most valuable as a negative predictor"],"correct":["A negative fFN result reliably predicts preterm birth will NOT occur in the next 1\u20132 weeks","The test should not be performed if the patient had intercourse within the last 48 hours","The test should not be performed if vaginal bleeding is present","fFN is most valuable as a negative predictor"],"rationale":"fFN is a NEGATIVE predictor \u2014 its value is in ruling out imminent preterm birth when negative. A positive result is not reliable due to frequent false positives. False positives occur with: recent intercourse (within 48 hrs) and vaginal bleeding. Both are contraindications to testing. A positive fFN does NOT confirm imminent birth.","chapter":"Chapter 16"},{"type":"highlight","num":6,"stem":"A nurse reviews the following assessment of a patient at 38 weeks who had a cesarean 4 years ago (classical incision) and is now in labor: 'Patient in active labor, contractions q3 min \u00d7 70 sec. Suddenly reports severe abdominal pain. FHR drops from 148 to 52 bpm. Contractions are no longer palpable. Patient pale, diaphoretic, BP 80/48, HR 128. Nurse palpates what feels like a fetal part above the umbilicus.' Select ALL findings that indicate a uterine rupture.","sentences":["Sudden severe abdominal pain","FHR drops from 148 to 52 bpm","Contractions are no longer palpable","Patient pale, diaphoretic","BP 80/48, HR 128","Nurse palpates fetal part above umbilicus"],"correct":["Sudden severe abdominal pain","FHR drops from 148 to 52 bpm","Contractions are no longer palpable","Patient pale, diaphoretic","BP 80/48, HR 128","Nurse palpates fetal part above umbilicus"],"rationale":"All findings = classic uterine rupture presentation: sudden severe abdominal pain, sudden FHR abnormality/absent FHR, CESSATION OF CONTRACTIONS (uterus loses structural integrity), hypovolemic shock (pale, diaphoretic, hypotension, tachycardia), palpable fetal parts outside uterine contour. Classical incision = highest rupture risk. Emergency c-section + treat shock.","chapter":"Chapter 16"},{"type":"order","num":7,"stem":"A nurse identifies cord prolapse after AROM. Place the following interventions in the correct priority order (1 = first).","items":["Call for help","Manually elevate the presenting part off the cord with a gloved hand","Reposition patient to knee-chest or Trendelenburg","Prepare the patient for emergency cesarean birth","Explain in simple terms what is happening to reduce patient anxiety","Apply O2 via NRB mask"],"correct_order":["Call for help","Manually elevate the presenting part off the cord with a gloved hand","Reposition patient to knee-chest or Trendelenburg","Apply O2 via NRB mask","Prepare the patient for emergency cesarean birth","Explain in simple terms what is happening to reduce patient anxiety"],"rationale":"Cord prolapse priority: (1) Call for help \u2014 simultaneous with physical intervention but listed first; (2) Manual elevation of presenting part \u2014 the immediate life-saving act that relieves compression; (3) Reposition knee-chest/Trendelenburg \u2014 gravity shifts fetus away from cord; (4) O2; (5) Prepare for emergency c-section; (6) Emotional support (important but not first). Maintain manual elevation continuously until delivery.","chapter":"Chapter 16"},{"type":"emr","num":8,"stem":"A nurse is caring for a patient with PPROM at 29 weeks. Select ALL nursing interventions that are correct.","options":["Perform frequent digital vaginal exams to assess dilation progress","Avoid frequent digital vaginal exams to reduce infection risk","Administer prophylactic antibiotics as ordered","Assess maternal temperature every 2 hours given ROM status","Perform amniotomy to assess amniotic fluid character","Monitor for signs of chorioamnionitis","Confirm ROM with sterile speculum exam, Nitrazine, and fern test"],"correct":["Avoid frequent digital vaginal exams to reduce infection risk","Administer prophylactic antibiotics as ordered","Assess maternal temperature every 2 hours given ROM status","Monitor for signs of chorioamnionitis","Confirm ROM with sterile speculum exam, Nitrazine, and fern test"],"rationale":"PPROM management: AVOID frequent digital vaginal exams (increases infection risk significantly). Prophylactic antibiotics given for PPROM. Temp assessed q2 hrs with ROM (q1 hr if signs of infection). Monitor for chorioamnionitis (fever, fetal/maternal tachycardia, tender uterus, foul fluid). ROM confirmed with: sterile speculum (pooling), Nitrazine (alkaline = blue), fern test (crystallization pattern). Amniotomy is AROM \u2014 membranes are already ruptured in PPROM.","chapter":"Chapter 16"},{"type":"bowtie","num":9,"stem":"A patient at 39 weeks receiving Pitocin develops contractions occurring every 2 minutes, lasting 2 minutes each, with a firm uterine resting tone. The FHR shows late decelerations with minimal variability.","action_left":"Priority nursing actions","actions_left":["Stop the Pitocin infusion","Reposition to left lateral","Administer O2 via NRB","Increase Pitocin to strengthen ctx","Notify the HCP","Administer terbutaline 0.25 mg SQ"],"correct_actions":["Stop the Pitocin infusion","Reposition to left lateral","Administer O2 via NRB","Notify the HCP","Administer terbutaline 0.25 mg SQ"],"condition":"Primary problem causing the FHR pattern","conditions":["Uterine atony","Cord compression","Tachysystole with placental insufficiency","Normal labor progression","Fetal cardiac arrhythmia"],"correct_condition":"Tachysystole with placental insufficiency","parameter":"Parameters indicating tachysystole","parameters":["Contractions every 2 min lasting 2 min","Firm uterine resting tone","Fetal tachycardia","Late decelerations","FHR baseline 145 bpm"],"correct_parameters":["Contractions every 2 min lasting 2 min","Firm uterine resting tone","Late decelerations"],"rationale":"Ctx q2 min \u00d7 120 sec + firm resting tone = tachysystole (ctx duration >120 sec AND firm resting tone are both tachysystole criteria). Late decelerations = placental insufficiency from reduced perfusion during excessive uterine activity. Full LION PIT + terbutaline. Increasing Pitocin would be dangerous. The combo of tachysystole + late decels with minimal variability = non-reassuring = immediate intervention.","chapter":"Chapter 16"},{"type":"dropdown","num":10,"stem":"A patient delivers the placenta and the nurse notes the fundus is absent from the abdomen and a dark red mass is protruding through the cervix. The patient's BP is 68/40 and HR is 134 bpm. This presentation is most consistent with [BLANK1]. The nurse's priority action after calling for help is to [BLANK2]. This complication is most likely caused by [BLANK3].","blanks":[{"id":"BLANK1","options":["postpartum hemorrhage from uterine atony","uterine inversion","uterine rupture","cord prolapse"],"correct":"uterine inversion"},{"id":"BLANK2","options":["perform fundal massage","assist the physician with manual replacement of the uterus","administer methylergonovine IM","prepare for emergency hysterectomy"],"correct":"assist the physician with manual replacement of the uterus"},{"id":"BLANK3","options":["excessive oxytocin use","excessive traction on umbilical cord after delivery","failure to deliver the placenta within 30 minutes","uterine atony after a long labor"],"correct":"excessive traction on umbilical cord after delivery"}],"rationale":"Uterine inversion: uterus turns inside out, typically 3rd stage. Signs: fundus absent from abdomen, uterus protruding through cervix, massive hemorrhage, shock. Management: physician manually replaces uterus (may need anesthesia). Primary risk factor: excessive cord traction. After replacement: assess fundal firmness/position, treat shock. Uterine rupture presents during labor with cessation of contractions and fetal parts palpable outside uterus.","chapter":"Chapter 16"},{"type":"emr","num":11,"stem":"A nurse is performing an assessment to confirm ROM in a patient with suspected PPROM. Select ALL tests that are used to confirm rupture of membranes.","options":["Sterile speculum exam (look for pooling)","Nitrazine pH test (alkaline = blue)","Fern test (crystallization pattern on dried slide)","Fetal fibronectin test","Ultrasound to measure amniotic fluid index","Digital vaginal exam to assess dilation"],"correct":["Sterile speculum exam (look for pooling)","Nitrazine pH test (alkaline = blue)","Fern test (crystallization pattern on dried slide)"],"rationale":"Three tests confirm ROM: (1) Sterile speculum exam \u2014 look for pooling of fluid. (2) Nitrazine test \u2014 amniotic fluid is alkaline, turns strip blue. (3) Fern test \u2014 microscopic fern-like crystallization of dried amniotic fluid. fFN predicts preterm birth risk but does not confirm ROM. AFI on ultrasound can suggest oligohydramnios but is not a direct ROM confirmation test. Digital vaginal exam is AVOIDED with suspected ROM to reduce infection risk.","chapter":"Chapter 16"},{"type":"matrix","num":12,"stem":"For each labor complication, identify the Cause, Key Sign, and Priority Intervention.","rows":["Shoulder dystocia","Cord prolapse","Uterine rupture","Uterine inversion"],"cols":["Turtle sign / McRoberts first-line","Sudden bradycardia after ROM / Manual elevation of presenting part","Cessation of contractions + absent FHR / Emergency c-section","Fundus absent from abdomen / Manual replacement by physician"],"correct":["Turtle sign / McRoberts first-line","Sudden bradycardia after ROM / Manual elevation of presenting part","Cessation of contractions + absent FHR / Emergency c-section","Fundus absent from abdomen / Manual replacement by physician"],"rationale":"Shoulder dystocia: turtle sign + McRoberts (hyperflex thighs) first-line. Cord prolapse: bradycardia after ROM + manual elevation to relieve compression. Uterine rupture: cessation of ctx + absent/abnormal FHR + hypovolemic shock + emergency c-section. Uterine inversion: fundus absent/protruding + physician manually replaces. All are OB emergencies requiring immediate recognition and action.","chapter":"Chapter 16"},{"type":"highlight","num":13,"stem":"A nurse is reviewing the labor record of a patient at risk for dysfunctional labor. The record shows: 'G5P4, macrosomic fetus estimated 9 lbs 4 oz, patient anxious and reporting severe pain, contractions q8 min weak by palpation, cervix 4 cm unchanged \u00d7 3 hours, bladder visibly distended, oxytocin running at 4 mU/min.' Select ALL factors contributing to dysfunctional labor (the 4 P's).","sentences":["G5P4, macrosomic fetus estimated 9 lbs 4 oz","Patient anxious and reporting severe pain","Contractions q8 min weak by palpation","Cervix 4 cm unchanged \u00d7 3 hours","Bladder visibly distended","Oxytocin running at 4 mU/min"],"correct":["G5P4, macrosomic fetus estimated 9 lbs 4 oz","Patient anxious and reporting severe pain","Contractions q8 min weak by palpation","Bladder visibly distended"],"rationale":"The 4 P's of dysfunctional labor: Passenger (macrosomic fetus at 9 lbs 4 oz = >8 lb 13 oz threshold), Psyche (patient anxious and in severe pain = impaired coping interfering with labor), Powers (weak ctx q8 min = ineffective contractions = secondary arrest), Passage (bladder distension = soft tissue obstruction preventing fetal descent). The cervix unchanged \u00d7 3 hrs is a RESULT of dysfunctional labor, not a P. Oxytocin at 4 mU/min is an intervention already in place.","chapter":"Chapter 16"},{"type":"emr","num":14,"stem":"A patient at 28 weeks develops preterm labor. Select ALL factors from her history that are known RISK FACTORS for preterm labor.","options":["Previous preterm birth at 32 weeks","Current cervical length 1.8 cm","Active periodontal disease","Singleton pregnancy","Gestational diabetes","Prior history of preeclampsia","BMI of 22","Tobacco use during pregnancy"],"correct":["Previous preterm birth at 32 weeks","Current cervical length 1.8 cm","Active periodontal disease","Gestational diabetes","Prior history of preeclampsia","Tobacco use during pregnancy"],"rationale":"Risk factors from the slides: Previous preterm birth (strong indicator), cervical length <2.5 cm (risk threshold), periodontal disease (infection can trigger preterm labor), diabetes, preeclampsia (OB condition associated with preterm labor), maternal smoking. Singleton pregnancy is not a risk factor (multifetal gestation is). BMI of 22 is normal and not a risk factor.","chapter":"Chapter 16"},{"type":"dropdown","num":15,"stem":"A nurse caring for a patient in precipitous labor knows that precipitous labor is defined as birth occurring in [BLANK1]. The primary maternal risk is [BLANK2], and the primary fetal risk is [BLANK3].","blanks":[{"id":"BLANK1","options":["less than 1 hour","less than 3 hours","less than 6 hours","less than 12 hours"],"correct":"less than 3 hours"},{"id":"BLANK2","options":["uterine atony and hemorrhage","cord prolapse","placental abruption","preeclampsia"],"correct":"uterine atony and hemorrhage"},{"id":"BLANK3","options":["macrosomia","poor fetal oxygenation","neonatal sepsis","jaundice"],"correct":"poor fetal oxygenation"}],"rationale":"Precipitous labor = birth in <3 hours from labor onset. Risks from the slides: maternal hemorrhage (rapid delivery + inadequate uterine contraction time) and poor fetal oxygenation (rapid, intense contractions reduce placental perfusion time). This is distinct from prolonged labor (maternal infection/exhaustion risk) and from tachysystole (Pitocin-related).","chapter":"Chapter 16"},{"type":"dropdown","num":1,"stem":"A nurse assesses a patient on postpartum day 1. The fundus is palpated 1 cm below the umbilicus and is firm and midline. The nurse recognizes this as [BLANK1] because the fundus descends [BLANK2] per day. This patient's fundal height is [BLANK3].","blanks":[{"id":"BLANK1","options":["subinvolution requiring notification of the HCP","a normal finding","an abnormal finding requiring fundal massage","evidence of uterine atony"],"correct":"a normal finding"},{"id":"BLANK2","options":["2 cm","1 cm (1 fingerbreadth)","0.5 cm","3 cm"],"correct":"1 cm (1 fingerbreadth)"},{"id":"BLANK3","options":["displaced to the right \u2014 bladder is likely full","above expected level \u2014 subinvolution possible","within expected range for day 1","below expected level \u2014 hemorrhage is occurring"],"correct":"within expected range for day 1"}],"rationale":"Fundal descent: immediately after delivery = 2 cm BELOW umbilicus; within 12 hrs = at umbilicus; then 1 cm/day descent. By day 14 = no longer palpable. On Day 1, 1 cm below umbilicus is expected (descended 1 cm from the 12-hr position). Firm and midline = normal. Boggy = atony. Displaced to right = full bladder. Rising above expected = full bladder or subinvolution.","chapter":"Chapter 17"},{"type":"matrix","num":2,"stem":"Match each lochia type with its correct characteristics.","rows":["Days 1\u20133: bright red, bloody, small clots, fleshy odor","Days 4\u201310: pink or brown-tinged, decreased amount, serosanguinous","Days 11\u201314 to 6 weeks: white, cream, or yellow, decreased amount"],"cols":["Lochia rubra","Lochia serosa","Lochia alba"],"correct":["Lochia rubra","Lochia serosa","Lochia alba"],"rationale":"Lochia rubra: days 1\u20133, bright red, bloody. Lochia serosa: days 4\u201310, pink/brown, serosanguinous. Lochia alba: day 11 onward (up to 6 weeks), white/cream/yellow. A return to lochia rubra after serosa = abnormal (possible subinvolution or retained fragments). Foul odor at any stage = infection. Completely absent lochia can also indicate infection.","chapter":"Chapter 17"},{"type":"highlight","num":3,"stem":"A nurse assesses a patient 2 hours after vaginal delivery. Documentation reads: 'Fundus boggy, 2 cm above umbilicus, displaced to right. Lochia rubra heavy \u2014 saturated pad in 15 minutes. Patient reports inability to void since delivery. VS: BP 108/68, HR 112, RR 18, Temp 98.6\u00b0F.' Select ALL abnormal findings requiring immediate nursing action.","sentences":["Fundus boggy, 2 cm above umbilicus","Displaced to right","Lochia rubra heavy \u2014 saturated pad in 15 minutes","Patient reports inability to void since delivery","BP 108/68, HR 112, RR 18","Temp 98.6\u00b0F"],"correct":["Fundus boggy, 2 cm above umbilicus","Displaced to right","Lochia rubra heavy \u2014 saturated pad in 15 minutes","Patient reports inability to void since delivery","BP 108/68, HR 112, RR 18"],"rationale":"Multiple abnormal findings: boggy fundus (uterine atony), displaced RIGHT (full bladder), 2 cm ABOVE umbilicus on day 0 (elevated \u2014 full bladder contributing), saturated pad in 15 min (excessive = emergent), inability to void (urinary retention \u2192 bladder distension \u2192 uterine displacement \u2192 atony \u2192 hemorrhage cascade), tachycardia HR 112 (early shock sign). Temp 98.6\u00b0F is normal. The chain: full bladder \u2192 uterine displacement \u2192 atony \u2192 hemorrhage \u2192 tachycardia.","chapter":"Chapter 17"},{"type":"emr","num":4,"stem":"A postpartum nurse is performing assessments at 15 minutes, 30 minutes, and 1 hour after vaginal delivery. Select ALL components that should be included in each postpartum assessment.","options":["Vital signs","Fundal height and tone","Lochia (amount, color, odor)","Perineum (REEDA)","Bladder elimination","Lower extremities for signs of thrombophlebitis","Breasts","Pain level","Newborn weight"],"correct":["Vital signs","Fundal height and tone","Lochia (amount, color, odor)","Perineum (REEDA)","Bladder elimination","Lower extremities for signs of thrombophlebitis","Breasts","Pain level"],"rationale":"Postpartum assessment from the slides includes: VS, fundal height/tone, lochia, perineum, pain, bladder elimination, breasts, and lower extremities. Assessments are q15 min \u00d7 first hour, q30 min \u00d7 second hour. The slide specifically lists all these components. Newborn weight is a neonatal assessment, not a maternal PP assessment.","chapter":"Chapter 17"},{"type":"bowtie","num":5,"stem":"A postpartum patient on day 2 reports that she has been urinating very large amounts (3\u20134 times per hour) and waking up drenched in sweat. She is concerned this is abnormal.","action_left":"Nursing responses","actions_left":["Reassure the patient that diuresis and diaphoresis are expected on days 2\u20135","Restrict oral fluids to decrease urinary output","Obtain a urine culture to rule out UTI","Explain the physiologic reason for these changes","Notify the HCP of possible diabetes insipidus"],"correct_actions":["Reassure the patient that diuresis and diaphoresis are expected on days 2\u20135","Explain the physiologic reason for these changes"],"condition":"Physiologic process occurring","conditions":["Postpartum hemorrhage","Normal elimination of excess plasma volume","Diabetes insipidus","Urinary tract infection","Abnormal ADH response"],"correct_condition":"Normal elimination of excess plasma volume","parameter":"Parameters the nurse should monitor","parameters":["Urine output","Blood pressure for orthostatic changes","Signs of dehydration","WBC for infection","Coagulation studies"],"correct_parameters":["Urine output","Blood pressure for orthostatic changes","Signs of dehydration"],"rationale":"Pregnancy causes 30\u201345% increase in blood volume. After delivery, the body must eliminate this excess via diuresis (up to 3000 mL/day, peak days 2\u20135) and diaphoresis. This is EXPECTED and the nurse should explain this to the patient (slides: 'explain to pt why this is happening'). Monitor for orthostatic hypotension (common PP). Do NOT restrict fluids. Culture only if other UTI symptoms present. Not diabetes insipidus.","chapter":"Chapter 17"},{"type":"emr","num":6,"stem":"A postpartum nurse is teaching a patient about signs and symptoms she should report after discharge. Select ALL findings the nurse should include in teaching.","options":["Lochia that increases in amount or returns to bright red","Fever above 100.4\u00b0F after the first 24 hours","Localized area of redness, swelling, or pain in either breast","Mild breast engorgement on day 3","Leg tenderness, redness, warmth, or edema","Frequency, urgency, or burning with urination","Persistent abdominal or perineal pain","Normal lochia alba at 2 weeks"],"correct":["Lochia that increases in amount or returns to bright red","Fever above 100.4\u00b0F after the first 24 hours","Localized area of redness, swelling, or pain in either breast","Leg tenderness, redness, warmth, or edema","Frequency, urgency, or burning with urination","Persistent abdominal or perineal pain"],"rationale":"Patient teaching (from slide): fever, breast redness/pain (mastitis), persistent abdominal pain, persistent perineal pain, urinary symptoms, abnormal lochia (increased, bright red, clots, foul odor), leg symptoms (DVT). Mild breast engorgement on day 3 is EXPECTED. Normal lochia alba is EXPECTED \u2014 not reportable.","chapter":"Chapter 17"},{"type":"dropdown","num":7,"stem":"A postpartum patient on day 5 tells the nurse, 'I can't stop crying and I feel so irritable and anxious. But I can still take care of my baby fine.' The nurse recognizes this as [BLANK1], which typically begins [BLANK2] and resolves [BLANK3]. If symptoms persist beyond this time, the nurse should assess for [BLANK4].","blanks":[{"id":"BLANK1","options":["postpartum psychosis","postpartum depression","postpartum blues","normal grief response"],"correct":"postpartum blues"},{"id":"BLANK2","options":["immediately after delivery","in the first week","at 2 weeks","at 4\u20136 weeks"],"correct":"in the first week"},{"id":"BLANK3","options":["within 24 hours","by week 2","by week 4","by 6 weeks"],"correct":"by week 2"},{"id":"BLANK4","options":["uterine subinvolution","postpartum depression","postpartum psychosis","DVT"],"correct":"postpartum depression"}],"rationale":"Postpartum blues: irritability, anxiety, mood swings, fatigue, tearfulness. Key distinguishing feature: does NOT significantly impact ability to care for the infant. Begins first week, resolves by week 2. If symptoms persist beyond 2 weeks OR significantly impair function \u2192 assess for postpartum depression. Postpartum psychosis is rare, more severe, requires emergency treatment.","chapter":"Chapter 17"},{"type":"matrix","num":8,"stem":"A nurse is assessing the fundus. For each finding, identify the most likely cause and the correct nursing action.","rows":["Fundus soft/boggy, midline, at umbilicus with heavy lochia","Fundus firm, displaced to the right, with increased lochia","Fundus firm, midline, with bright red lochia and constant trickle despite firm uterus","Fundus not palpable at all on postpartum day 1"],"cols":["Uterine atony \u2014 massage fundus","Full bladder \u2014 assist to void and reassess","Cervical/birth canal laceration \u2014 notify provider","Subinvolution \u2014 notify provider / monitor closely"],"correct":["Uterine atony \u2014 massage fundus","Full bladder \u2014 assist to void and reassess","Cervical/birth canal laceration \u2014 notify provider","Subinvolution \u2014 notify provider / monitor closely"],"rationale":"Boggy + midline + heavy lochia = uterine atony (massage first). Firm + displaced right + increased lochia = full bladder causing displacement (empty bladder first). Firm + midline + constant trickle = NOT atony \u2014 must be laceration (firm fundus with bleeding = laceration per the slides). Not palpable at Day 1 = subinvolution (fundus should be palpable until Day 14).","chapter":"Chapter 17"},{"type":"emr","num":9,"stem":"A patient is in the taking-hold phase of postpartum psychosocial adaptation (postpartum day 4). Select ALL nursing actions that are appropriate for this phase.","options":["Defer all teaching until the patient requests it","Provide detailed newborn care teaching \u2014 this is the optimal time","Offer encouragement rather than criticism when she makes mistakes","Focus on meeting the patient's own basic needs first","Allow the patient to practice infant care with guidance and feedback","Refer to social work because she is not yet bonding","Expect the patient to be less dependent and ready to learn"],"correct":["Provide detailed newborn care teaching \u2014 this is the optimal time","Offer encouragement rather than criticism when she makes mistakes","Allow the patient to practice infant care with guidance and feedback","Expect the patient to be less dependent and ready to learn"],"rationale":"Taking-hold phase (2\u201310 days): patient is ready to take control, less dependent, but may be critical of her own abilities. This is the BEST TIME FOR TEACHING. Nurse provides encouragement (not criticism), allows practice, and gives feedback. Taking-in phase (24\u201348 hrs) = focus on basic needs. Letting-go phase (2\u20136 wks) = shifts focus to entire family. Social work referral is not indicated unless there are specific concerning signs.","chapter":"Chapter 17"},{"type":"highlight","num":10,"stem":"A nurse is assessing a patient after c-section on postpartum day 1. Notes read: 'Respirations 14/min and unlabored. Bowel sounds absent in all quadrants. Incision with REEDA score: R1, E2, E0, D0, A0. Fundus firm 1 cm above umbilicus and midline. Lochia rubra scant. Foley draining clear yellow urine 60 mL/hr. Patient using PCA pump for pain. No ambulation yet.' Select ALL findings that require nursing intervention.","sentences":["Respirations 14/min and unlabored","Bowel sounds absent in all quadrants","Incision REEDA score: R1, E2, E0, D0, A0","Fundus firm 1 cm above umbilicus and midline","Lochia rubra scant","Foley draining 60 mL/hr","Patient using PCA pump for pain","No ambulation yet"],"correct":["Bowel sounds absent in all quadrants","No ambulation yet"],"rationale":"Absent bowel sounds post-c-section = expected and normal in early post-op period BUT the nurse should monitor and implement interventions to promote return of bowel function (early ambulation, avoid straws/carbonated beverages, simethicone for gas). No ambulation yet on day 1 = the nurse should encourage early, frequent ambulation to prevent DVT and paralytic ileus \u2014 a specific c-section nursing concern from the slides. REEDA R1, E2 = mild \u2014 not emergent but monitored. Lochia scant after c-section = NORMAL (manual removal of lining). Fundus firm 1 cm above umbilicus on day 1 = expected. UO 60 mL/hr = adequate.","chapter":"Chapter 17"},{"type":"emr","num":11,"stem":"A postpartum patient on day 2 after vaginal delivery complains of significant perineal pain. The nurse uses the REEDA scale to assess the episiotomy. Select ALL components of the REEDA scale.","options":["Redness","Edema","Ecchymosis","Drainage (discharge)","Approximation","Depth","Asymmetry"],"correct":["Redness","Edema","Ecchymosis","Drainage (discharge)","Approximation"],"rationale":"REEDA scale: R=Redness (inflammation/infection), E=Edema (soft tissue damage), E=Ecchymosis (bruising/soft tissue damage), D=Drainage (discharge \u2014 none should ooze from wound), A=Approximation (wound edges should be close together). Depth and Asymmetry are not components of the standard REEDA scale.","chapter":"Chapter 17"},{"type":"dropdown","num":12,"stem":"A postpartum nurse notes that a patient's WBC count is 28,000/mm\u00b3 on postpartum day 1. The patient is afebrile with no other signs of infection. The nurse should [BLANK1] because postpartum leukocytosis [BLANK2] and WBCs return to normal by [BLANK3].","blanks":[{"id":"BLANK1","options":["notify the HCP immediately of likely infection","document and continue monitoring as this is expected","order blood cultures immediately","start broad-spectrum antibiotics"],"correct":"document and continue monitoring as this is expected"},{"id":"BLANK2","options":["indicates chorioamnionitis","is a normal response to labor and delivery, not caused by infection","indicates wound infection","is caused by retained placental fragments"],"correct":"is a normal response to labor and delivery, not caused by infection"},{"id":"BLANK3","options":["24 hours","3 days","6 days","2 weeks"],"correct":"6 days"}],"rationale":"Postpartum leukocytosis: WBC can increase to up to 30,000 during labor and immediately postpartum. This is NOT caused by infection \u2014 it is a normal physiologic response. WBCs return to normal by Day 6. Without fever or other infection signs, this finding alone does not warrant cultures or antibiotics. This is a high-frequency NCLEX distractor \u2014 don't confuse normal postpartum leukocytosis with pathologic infection.","chapter":"Chapter 17"},{"type":"emr","num":13,"stem":"A postpartum patient at 18 hours post-delivery reports dizziness when she tried to get up to use the bathroom. Her blood pressure sitting is 118/74. She stood up and felt lightheaded. Select ALL correct nursing actions.","options":["Instruct the patient to sit on the edge of the bed for 1\u20132 minutes before standing","Tell the patient she must remain on bedrest for 24 hours","Assist the patient to ambulate and stay with her","Notify the HCP of hypotensive emergency","Explain that orthostatic hypotension is common postpartum","Document the finding"],"correct":["Instruct the patient to sit on the edge of the bed for 1\u20132 minutes before standing","Assist the patient to ambulate and stay with her","Explain that orthostatic hypotension is common postpartum","Document the finding"],"rationale":"Orthostatic hypotension is common postpartum and is listed in the slides. The nurse instructs the patient to call for assistance before getting out of bed. Safety measures: dangle (sit on edge of bed first), assist during ambulation, stay with the patient. This does not require HCP notification unless it is severe or associated with hemorrhage signs. Bedrest is NOT appropriate \u2014 early ambulation is encouraged (DVT prevention, GI motility).","chapter":"Chapter 17"},{"type":"matrix","num":14,"stem":"Match each postpartum psychosocial phase with its characteristics and best nursing action.","rows":["Taking-In Phase (24\u201348 hrs)","Taking-Hold Phase (2\u201310 days)","Letting-Go Phase (2\u20136 weeks)"],"cols":["Focus on own needs, dependent, wants to talk about birth \u2014 meet basic needs first / defer heavy teaching","Ready to learn, less dependent, self-critical \u2014 BEST TIME FOR TEACHING / offer encouragement","Accepts new lifestyle, refocuses on partner, entire family focus \u2014 provide emotional support / normalize adjustment"],"correct":["Focus on own needs, dependent, wants to talk about birth \u2014 meet basic needs first / defer heavy teaching","Ready to learn, less dependent, self-critical \u2014 BEST TIME FOR TEACHING / offer encouragement","Accepts new lifestyle, refocuses on partner, entire family focus \u2014 provide emotional support / normalize adjustment"],"rationale":"Rubin's postpartum adaptation phases: Taking-In = passive/dependent/introspective (24\u201348 hrs); Taking-Hold = active learning/less dependent/self-critical (2\u201310 days) = BEST TEACHING TIME; Letting-Go = integrates new role/refocuses on relationships (2\u20136 wks). Teaching in the Taking-In phase is largely ineffective because the patient is focused on her own recovery needs.","chapter":"Chapter 17"},{"type":"emr","num":15,"stem":"A nurse is completing a postpartum assessment on a patient who had a cesarean birth 12 hours ago. Select ALL assessments that are SPECIFIC to post-cesarean care and are NOT part of routine vaginal delivery assessment.","options":["Respiratory assessment and oxygen saturation (increased risk from anesthesia)","Abdominal incision assessment using REEDA scale","Fundal assessment","Assessment for return of sensation/motor block from regional anesthesia","Bowel sounds assessment","Lochia assessment","SCDs (sequential compression devices) functioning","Abdominal distension prevention measures"],"correct":["Respiratory assessment and oxygen saturation (increased risk from anesthesia)","Abdominal incision assessment using REEDA scale","Assessment for return of sensation/motor block from regional anesthesia","Bowel sounds assessment","SCDs (sequential compression devices) functioning","Abdominal distension prevention measures"],"rationale":"Post-c-section specific assessments from the slides: respirations (narcotics in anesthesia \u2192 respiratory depression risk), abdominal dressing/incision (REEDA), return of regional block sensation/motion, LOC, bowel sounds (paralytic ileus risk), SCDs (DVT prevention), urine output, IV infusion, pain. Fundal assessment and lochia are done for BOTH vaginal and c-section patients \u2014 not c-section specific.","chapter":"Chapter 17"},{"type":"bowtie","num":1,"stem":"A patient who delivered vaginally 45 minutes ago has a boggy uterus, fundus 3 cm above the umbilicus, and saturated a pad in 15 minutes. The nurse massages the fundus and it temporarily becomes firm but immediately goes soft again.","action_left":"Priority nursing actions","actions_left":["Continue fundal massage","Assist patient to void or catheterize","Administer oxytocin as ordered","Notify the HCP","Administer methylergonovine (Methergine) if ordered","Administer misoprostol rectally if ordered"],"correct_actions":["Continue fundal massage","Assist patient to void or catheterize","Administer oxytocin as ordered","Notify the HCP"],"condition":"Most likely cause of bleeding","conditions":["Cervical laceration","Retained placental fragments","Uterine atony","Hematoma","Coagulation disorder"],"correct_condition":"Uterine atony","parameter":"Clinical findings supporting this condition","parameters":["Boggy/soft uterus","Fundus above expected level","Heavy lochia/excessive bleeding","Fundus firm with constant trickle","Perineal bulging mass"],"correct_parameters":["Boggy/soft uterus","Fundus above expected level","Heavy lochia/excessive bleeding"],"rationale":"Boggy fundus + heavy bleeding = uterine atony (most common cause of early PPH). Management: (1) Fundal massage (first action when boggy). (2) Empty bladder \u2014 full bladder prevents uterine contraction. (3) Oxytocin (first-line drug). Notify HCP for escalating management (Methergine, Hemabate). Note: Methergine is CONTRAINDICATED with hypertension. Fundus firm + bleeding = laceration (NOT atony). Perineal bulging mass = hematoma.","chapter":"Chapter 18"},{"type":"emr","num":2,"stem":"A nurse is managing a patient with postpartum hemorrhage from uterine atony. Select ALL uterotonic medications that may be ordered to manage uterine atony, in order from first-line to last resort.","options":["Oxytocin (Pitocin) \u2014 first-line","Methylergonovine (Methergine) IM \u2014 contraindicated with hypertension","Misoprostol (Cytotec) rectal","Carboprost tromethamine (Hemabate) IM \u2014 risk pulmonary edema","Calcium gluconate IV","Low molecular weight heparin"],"correct":["Oxytocin (Pitocin) \u2014 first-line","Methylergonovine (Methergine) IM \u2014 contraindicated with hypertension","Misoprostol (Cytotec) rectal","Carboprost tromethamine (Hemabate) IM \u2014 risk pulmonary edema"],"rationale":"PPH uterotonic progression: (1) Oxytocin \u2014 most common, given prophylactically in 3rd stage. (2) Methylergonovine (Methergine) IM \u2014 contracts uterus; CONTRAINDICATED if hypertensive (increases BP). (3) Misoprostol rectal suppository. (4) Carboprost tromethamine (Hemabate) IM or into uterine wall during c-section \u2014 risk of pulmonary edema. Calcium gluconate = magnesium antidote. Heparin = anticoagulant for DVT/PE, not PPH.","chapter":"Chapter 18"},{"type":"dropdown","num":3,"stem":"A postpartum patient has a firm fundus and normal lochia, but reports severe, constant, unrelieved perineal pressure and pain. The nurse notes a tense, discolored, bulging mass on the left labia. The nurse suspects [BLANK1]. This condition occurs when [BLANK2]. Management for a large hematoma involves [BLANK3].","blanks":[{"id":"BLANK1","options":["uterine atony","vulvar hematoma","cervical laceration","endometritis"],"correct":"vulvar hematoma"},{"id":"BLANK2","options":["the uterus fails to contract after placental delivery","bleeding into loose connective tissue occurs while overlying tissue remains intact","bacteria ascend from the vagina into the uterine lining","a tear occurs in the cervix during rapid delivery"],"correct":"bleeding into loose connective tissue occurs while overlying tissue remains intact"},{"id":"BLANK3","options":["fundal massage and oxytocin","surgical excision of the hematoma","IV antibiotics and cultures","bimanual compression of the uterus"],"correct":"surgical excision of the hematoma"}],"rationale":"Hematoma: bleeding into loose connective tissue while overlying tissue remains intact. Classic presentation: FIRM fundus (no atony), NORMAL lochia (concealed blood loss), severe unrelieved perineal/pelvic pain, discolored bulging mass (vulvar hematomas). Systemic signs of hypovolemic shock can develop from concealed blood loss. Small hematomas may resolve spontaneously; large hematomas require surgical excision. Key differentiator from atony: fundus firm, lochia normal.","chapter":"Chapter 18"},{"type":"matrix","num":4,"stem":"For each type of postpartum hemorrhage cause, match it to its key clinical features.","rows":["Uterine atony","Birth canal/cervical laceration","Hematoma","Retained placental fragments"],"cols":["Boggy fundus + heavy lochia","Firm fundus + constant trickle of bright red blood","Firm fundus + normal lochia + severe unrelieved pelvic pain","Subinvolution + prolonged lochia rubra + boggy fundus"],"correct":["Boggy fundus + heavy lochia","Firm fundus + constant trickle of bright red blood","Firm fundus + normal lochia + severe unrelieved pelvic pain","Subinvolution + prolonged lochia rubra + boggy fundus"],"rationale":"Uterine atony: boggy fundus is diagnostic. Laceration: FIRM fundus (uterus contracted normally) but bleeding continues \u2014 the source is the lacerated tissue. Hematoma: FIRM fundus + NORMAL lochia (blood trapped in connective tissue = concealed) + severe pain. Retained placental fragments: prevent full uterine contraction \u2192 subinvolution + prolonged/excessive lochia rubra + boggy fundus persisting after normal timeline.","chapter":"Chapter 18"},{"type":"emr","num":5,"stem":"A pos
