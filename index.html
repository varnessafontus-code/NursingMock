he PRIORITY nursing action?","opts":["A. Apply O2 via NRB at 8\u201310 L/min and notify HCP immediately \u2014 possible pulmonary embolism","B. Administer prescribed antibiotics \u2014 post-c-section pneumonia is the most likely diagnosis","C. Assess the incision for signs of wound infection","D. Obtain blood cultures and start IV fluids"],"ans":"A","rat":"The presentation \u2014 sudden dyspnea, tachycardia, decreasing O2 sat, post-surgical immobility, low-grade fever \u2014 is classic for PE. The priority is always OXYGENATION first in PE: O2 via NRB 8\u201310 L/min and immediate HCP notification. While pneumonia (B) is possible, the combination of immobility + tachycardia + sudden dyspnea + O2 desaturation in a post-c-section patient must be treated as PE until proven otherwise. Anticoagulation follows O2 and notification. Incision (C) and cultures (D) are not the priority when the patient is hypoxic."},{"ch":"Ch 18","n":4,"stem":"A patient is ordered methylergonovine (Methergine) 0.2 mg IM for uterine atony. Before administration, the nurse assesses BP 162/108. What is the nurse's correct action?","opts":["A. Administer as ordered \u2014 the elevated BP is caused by the PPH, not the medication","B. Hold the medication and notify the HCP \u2014 Methergine is contraindicated in hypertensive patients","C. Administer half the dose \u2014 reduced dose is safe in mild hypertension","D. Administer the medication and then administer a calcium channel blocker for the hypertension"],"ans":"B","rat":"Methergine (methylergonovine) causes vasoconstriction and INCREASES blood pressure. The slides state: 'Increases blood pressure, do not give if hypertensive.' BP 162/108 is in the hypertensive range \u2014 administering Methergine could precipitate hypertensive crisis, stroke, or eclampsia. The nurse MUST hold and notify the provider. An alternative uterotonic (misoprostol rectal, Hemabate) will be ordered. This is a high-priority medication safety NCLEX question."},{"ch":"Ch 18","n":5,"stem":"A patient 3 days after cesarean birth develops: right calf pain, swelling, redness, and warmth. The nurse suspects DVT. The INCORRECT nursing action would be:","opts":["A. Notify the HCP","B. Prepare for venous ultrasound","C. Vigorously massage the affected calf to promote circulation","D. Anticipate anticoagulation therapy orders"],"ans":"C","rat":"Massaging a suspected DVT clot can dislodge it and cause a pulmonary embolism \u2014 NEVER massage a leg with suspected DVT. All other actions (notify HCP, prepare for diagnostic ultrasound, anticipate anticoagulation) are correct. This is a classic NCLEX question where the student must identify the ONE INCORRECT action. The 'incorrect' option here is the one that could kill the patient by converting a DVT into a PE."},{"ch":"Ch 18","n":6,"stem":"A postpartum patient is started on heparin infusion for DVT treatment. Eight hours into the infusion, the nurse notes: PTT 240 seconds (therapeutic range: 60\u2013100 seconds), HR 96 bpm, BP 110/68, and the patient reports perineal bruising getting worse. What is the nurse's priority?","opts":["A. Continue the infusion \u2014 PTT elevations are expected with heparin","B. Stop the heparin infusion and notify the HCP \u2014 the PTT is supratherapeutic indicating heparin overdose","C. Administer vitamin K \u2014 this is the heparin antidote","D. Increase the heparin rate \u2014 higher PTT provides better clot protection"],"ans":"B","rat":"PTT 240 sec is MORE than double the upper therapeutic limit (60\u2013100 sec) = supratherapeutic = heparin overdose. Combined with worsening bruising = signs of anticoagulant toxicity. Stop the infusion and notify the HCP. Protamine sulfate is the antidote for heparin (not vitamin K \u2014 vitamin K reverses warfarin). Increasing the rate (D) would be dangerous. Accepting supratherapeutic levels (A) without acting would risk major hemorrhage."},{"ch":"Ch 18","n":7,"stem":"A patient 10 days postpartum calls the maternity unit reporting that her lochia has returned to bright red after being yellowish-white for 3 days. She also has a low-grade fever of 100.8\u00b0F and says her abdomen feels tender. What does the nurse suspect?","opts":["A. Normal lochia progression \u2014 return of rubra at day 10 is expected","B. Late postpartum hemorrhage from possible retained placental fragments or endometritis \u2014 the patient should be evaluated","C. Normal postpartum activity \u2014 lochia increases with increased activity","D. The patient is menstruating \u2014 periods can return by day 10 postpartum"],"ans":"B","rat":"Return to lochia rubra (bright red) after progressing to alba on day 10 = ABNORMAL. Combined with low-grade fever + abdominal tenderness = late PPH + possible endometritis or retained placental fragments. Late PPH is defined as occurring after 24 hours up to 6 weeks postpartum. Retained placental fragments prevent uterine involution. This patient needs in-person evaluation \u2014 ultrasound + cultures + possible D&C. Menstruation (D) is unlikely at day 10 and doesn't explain fever/tenderness."},{"ch":"Ch 18","n":8,"stem":"A nurse is caring for a breastfeeding patient on postpartum day 5 who develops: localized left breast redness, swelling, warmth, and tenderness. Temperature 101.6\u00b0F. She asks if she should stop breastfeeding. The nurse's correct response is:","opts":["A. 'Yes \u2014 you should stop breastfeeding to allow the breast to heal and prevent passing infection to your baby'","B. 'Continue breastfeeding on both breasts \u2014 emptying the breast helps reduce engorgement and supports recovery from mastitis'","C. 'Switch to exclusively pumping and discarding the milk until antibiotics are completed'","D. 'Stop breastfeeding from the affected side only and pump and discard that milk'"],"ans":"B","rat":"Mastitis management: CONTINUE breastfeeding on BOTH sides. Continued breastfeeding/emptying reduces engorgement, prevents abscess formation, and does NOT harm the infant (the infection is in the breast tissue, not the milk itself). Antibiotics (typically dicloxacillin or cephalexin) are prescribed. Warm compresses, supportive bra, and frequent feeding/pumping are all recommended. Stopping breastfeeding worsens engorgement and increases abscess risk."},{"ch":"Ch 18","n":9,"stem":"A nurse pre-medicates a hypertensive postpartum patient with severe PPH who has not responded to oxytocin. The provider orders carboprost tromethamine (Hemabate) IM. Which pre-administration assessment is MOST critical?","opts":["A. Serum magnesium level \u2014 Hemabate interacts with magnesium","B. Blood pressure \u2014 while not contraindicated in hypertension, Hemabate can increase BP","C. Presence of asthma \u2014 Hemabate causes bronchospasm and is contraindicated in asthma","D. Serum potassium \u2014 Hemabate causes significant electrolyte shifts"],"ans":"C","rat":"Carboprost (Hemabate) is a prostaglandin F2\u03b1 that causes bronchospasm. It is CONTRAINDICATED in patients with asthma. Before administering, the nurse must screen for asthma history. Additionally, Hemabate carries risk of pulmonary edema \u2014 assess respiratory status. While BP monitoring matters (B), asthma is the specific contraindication, not hypertension. Magnesium (A) and potassium (D) interactions are not the primary concern."},{"ch":"Ch 18","n":10,"stem":"A postpartum patient at 2 hours after vaginal delivery has a pre-delivery hematocrit of 38% and a post-delivery hematocrit of 24%. She is tachycardic at 124 bpm and hypotensive at 86/50 mmHg. What is the nurse's understanding of these findings?","opts":["A. A hematocrit drop of 14% is within normal limits for vaginal delivery","B. This significant hematocrit drop combined with tachycardia and hypotension indicates substantial blood loss requiring urgent management for hypovolemic shock","C. The post-delivery hematocrit always drops by 10\u201315% \u2014 this is physiologic","D. The tachycardia is caused by epidural hypotension \u2014 increase the IV rate"],"ans":"B","rat":"The slide states: 'Pre-labor hematocrit is compared to post-delivery hematocrit to determine severity of blood loss.' A 14-point drop in hematocrit + tachycardia (EARLIEST sign of shock) + hypotension = hypovolemic shock from significant hemorrhage. Normal vaginal delivery blood loss = up to 500 mL. This patient has exceeded that significantly. Management: 2nd large-bore IV, fluids/blood products, identify bleeding source, vasopressors if refractory. A physiologic 10\u201315% drop (C) does not produce hemodynamic instability."},{"ch":"Ch 18","n":11,"stem":"A patient with postpartum sepsis from endometritis is being treated with IV antibiotics. Her WBC is 32,000, temperature 103.2\u00b0F, HR 136, BP 88/56. The nurse recognizes that a urine output of 22 mL/hr indicates:","opts":["A. Normal postpartum diuresis \u2014 output is acceptable on day 5","B. Oliguria indicating end-organ hypoperfusion from septic shock \u2014 notify HCP and prepare for fluid resuscitation","C. Urinary retention from infection \u2014 insert Foley catheter","D. Expected finding with IV antibiotics \u2014 nephrotoxic antibiotics reduce urine output"],"ans":"B","rat":"UO 22 mL/hr is below the 30 mL/hr minimum threshold. Combined with hemodynamic instability (HR 136, BP 88/56), high fever, and markedly elevated WBC = septic shock with end-organ (renal) hypoperfusion. The goal in shock management is to maintain UO \u226530 mL/hr. This requires urgent fluid resuscitation and HCP notification. This is not normal postpartum diuresis (A) \u2014 diuresis produces HIGH urine output (up to 3000 mL/day), not oliguria. Nephrotoxic antibiotics (D) can reduce output but the clinical picture here is septic shock."},{"ch":"Ch 18","n":12,"stem":"A postpartum patient develops a PE and is started on low molecular weight heparin (LMWH/Lovenox). She has a new baby and is eager to breastfeed. The nurse's teaching about LMWH and breastfeeding is:","opts":["A. 'You must stop breastfeeding while on Lovenox \u2014 it passes into breast milk and harms the baby'","B. 'Lovenox is considered safe with breastfeeding \u2014 you may continue nursing your baby'","C. 'Pump and discard for 24 hours after each dose to prevent anticoagulant effects in the baby'","D. 'Breastfeeding will thin your blood further \u2014 avoid it while on anticoagulation'"],"ans":"B","rat":"Low molecular weight heparin (Lovenox/enoxaparin) has very poor oral bioavailability and large molecular size \u2014 it does NOT pass significantly into breast milk, and even if small amounts did, it would not be absorbed by the infant's GI tract. LMWH is considered SAFE with breastfeeding by major clinical guidelines. The nurse should encourage continued breastfeeding. This is important to prevent unnecessary weaning from anticoagulation fear."},{"ch":"Ch 18","n":13,"stem":"A nurse is evaluating a postpartum patient for possible infection. Which combination of findings MOST strongly indicates endometritis specifically (rather than other postpartum infections)?","opts":["A. Bilateral breast redness, engorgement, and fever","B. Urinary frequency, urgency, dysuria, and suprapubic pain","C. Foul-smelling brown/purulent lochia, subinvolution, uterine tenderness, fever, and leukocytosis","D. Incision redness with purulent drainage and wound edge separation"],"ans":"C","rat":"Endometritis = infection of the uterine LINING. Cardinal signs: foul-smelling lochia (often brown or purulent), SUBINVOLUTION (fundus higher than expected = uterus not involuting normally), uterine TENDERNESS, fever, chills, leukocytosis. A = mastitis. B = UTI/cystitis. D = wound infection. Uterine-specific signs (lochia changes + subinvolution + fundal tenderness) are the distinguishing features of endometritis."},{"ch":"Ch 18","n":14,"stem":"A nurse is documenting PPH management. The patient's fundus remains boggy despite massage and oxytocin. The provider orders bimanual compression. The nurse assists by:","opts":["A. Applying downward fundal pressure externally while the provider applies internal pressure \u2014 bimanual compresses the uterus between both hands","B. Massaging the fundus vigorously with both hands simultaneously","C. Holding the lower uterine segment while the provider performs D&C","D. Maintaining IV access while the provider performs bimanual compression \u2014 no direct assistance is needed"],"ans":"A","rat":"Bimanual compression involves one hand internally (inserted vaginally into the uterus) applying upward pressure, and one hand externally on the abdomen applying downward counter-pressure \u2014 the uterus is compressed BETWEEN both hands to stimulate contraction and tamponade bleeding. The nurse assists by maintaining the external abdominal component or by assisting with positioning/access while the provider performs the procedure. This follows massage and pharmacologic management failure."},{"ch":"Ch 18","n":15,"stem":"A postpartum patient on day 2 after emergency cesarean for abruptio placentae is noted to have oozing from her IV site, petechiae on her arms, and her lochia is much heavier than expected. Lab results: platelets 62,000, PT/PTT elevated, fibrinogen 95 mg/dL (normal >150). What complication does the nurse recognize?","opts":["A. Normal postpartum coagulopathy \u2014 clotting factors are always low after delivery","B. Disseminated intravascular coagulation (DIC) \u2014 simultaneous clotting and bleeding from consumption of clotting factors","C. Heparin-induced thrombocytopenia \u2014 low platelets from anticoagulation","D. Normal wound healing variation \u2014 petechiae are common after cesarean"],"ans":"B","rat":"DIC presentation: simultaneous signs of clotting AND bleeding. Signs here: oozing IV site (microvascular bleeding), petechiae (clotting consuming platelets \u2192 thrombocytopenia 62,000), heavy lochia, elevated PT/PTT (coagulation factors depleted), low fibrinogen (consumed in pathologic clotting). DIC is a known complication of placental abruption (and AFE, severe infection, PPH). Management: treat underlying cause, blood component therapy (FFP, cryoprecipitate, platelets), supportive care. This is NOT normal coagulopathy (A)."}];

/* ---- state ---- */
var ngnAns = {}, nclexAns = {}, nclexSel = {}, ordState = {};
var ngnFilter = 'all', nclexFilter = 'all';

/* ---- tabs ---- */
document.querySelectorAll('.tab-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    var pane = btn.getAttribute('data-pane');
    document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.remove('active'); });
    document.querySelectorAll('.pane').forEach(function(p){ p.classList.remove('active'); });
    btn.classList.add('active');
    document.getElementById('pane-' + pane).classList.add('active');
    if (pane === 'scores') buildSummary();
  });
});

/* ---- chapter filters ---- */
document.querySelectorAll('#ngn-filter .ch-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    ngnFilter = btn.getAttribute('data-ch');
    document.querySelectorAll('#ngn-filter .ch-btn').forEach(function(b){ b.classList.remove('active'); });
    btn.classList.add('active');
    renderNGN();
  });
});
document.querySelectorAll('#nclex-filter .ch-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    nclexFilter = btn.getAttribute('data-ch');
    document.querySelectorAll('#nclex-filter .ch-btn').forEach(function(b){ b.classList.remove('active'); });
    btn.classList.add('active');
    renderNCLEX();
  });
});

/* ---- helpers ---- */
function qkey(q) { return q.chapter.replace(/ /g,'_') + '_' + q.num; }
function nqkey(q) { return 'n_' + q.ch.replace(/ /g,'_') + '_' + q.n; }
function el(id) { return document.getElementById(id); }

var TYPE_LABELS = {
  bowtie:'Bowtie', emr:'Extended Multiple Response',
  dropdown:'Dropdown / Cloze', matrix:'Matrix',
  highlight:'Highlight', order:'Ordering'
};

/* ===================== NGN ===================== */
function renderNGN() {
  var qs = ngnFilter === 'all' ? NGN_DATA : NGN_DATA.filter(function(q){ return q.chapter === ngnFilter; });
  var list = el('ngn-list');
  list.innerHTML = '';
  if (!qs.length) { list.innerHTML = '<div class="no-q">No questions.</div>'; return; }
  qs.forEach(function(q, idx) {
    var k = qkey(q);
    var card = document.createElement('div');
    card.className = 'qcard';
    card.id = 'ngn-card-' + k;
    card.innerHTML = buildNGNHTML(q, k, idx + 1);
    list.appendChild(card);
    attachNGNEvents(q, k);
  });
  updateScores();
}

function buildNGNHTML(q, k, n) {
  var h = '<div class="q-hdr">'
    + '<span class="badge badge-num">#' + n + ' ' + q.chapter + ' Q' + q.num + '</span>'
    + '<span class="badge badge-type">' + (TYPE_LABELS[q.type] || q.type) + '</span>'
    + '</div><div class="q-stem">' + q.stem + '</div>';

  if (q.type === 'emr') {
    h += '<div class="opts" id="emr-' + k + '">';
    q.options.forEach(function(o, i) {
      h += '<div class="opt" id="emr-opt-' + k + '-' + i + '" data-key="' + k + '" data-idx="' + i + '" data-role="emr">'
        + '<span class="chk" id="emr-chk-' + k + '-' + i + '">\u2610</span><span>' + o + '</span></div>';
    });
    h += '</div>';
  } else if (q.type === 'bowtie') {
    h += '<div style="margin-bottom:10px"><div class="bt-lbl">Actions to Take (select all that apply)</div><div class="opts" id="bt-act-' + k + '">';
    q.actions_left.forEach(function(a, i) {
      h += '<div class="opt" id="bta-' + k + '-' + i + '" data-key="' + k + '" data-idx="' + i + '" data-role="bta">'
        + '<span class="chk" id="bta-chk-' + k + '-' + i + '">\u2610</span><span>' + a + '</span></div>';
    });
    h += '</div></div><div style="margin-bottom:10px"><div class="bt-lbl">Most Likely Condition (select one)</div><div class="opts" id="bt-cond-' + k + '">';
    q.conditions.forEach(function(c, i) {
      h += '<div class="opt" id="btc-' + k + '-' + i + '" data-key="' + k + '" data-idx="' + i + '" data-condlen="' + q.conditions.length + '" data-role="btc">'
        + '<span class="opt-ltr">' + String.fromCharCode(65+i) + '.</span><span>' + c + '</span></div>';
    });
    h += '</div></div><div><div class="bt-lbl">Parameters to Monitor (select all that apply)</div><div class="opts" id="bt-param-' + k + '">';
    q.parameters.forEach(function(p, i) {
      h += '<div class="opt" id="btp-' + k + '-' + i + '" data-key="' + k + '" data-idx="' + i + '" data-role="btp">'
        + '<span class="chk" id="btp-chk-' + k + '-' + i + '">\u2610</span><span>' + p + '</span></div>';
    });
    h += '</div></div>';
  } else if (q.type === 'dropdown') {
    var stem2 = q.stem;
    q.blanks.forEach(function(b, bi) {
      var opts2 = '<option value="">-- select --</option>';
      b.options.forEach(function(o) { opts2 += '<option value="' + o.replace(/"/g,'&quot;').replace(/'/g,'&#39;') + '">' + o + '</option>'; });
      stem2 = stem2.replace('[' + b.id + ']',
        '<select class="dd-sel" id="dd-' + k + '-' + bi + '">' + opts2 + '</select>');
    });
    h += '<div class="dd-wrap">' + stem2 + '</div>';
  } else if (q.type === 'matrix') {
    h += '<div class="mat-wrap"><table class="mat"><thead><tr><th>Statement</th>';
    q.cols.forEach(function(c) { h += '<th>' + c + '</th>'; });
    h += '</tr></thead><tbody>';
    q.rows.forEach(function(row, ri) {
      h += '<tr><td>' + row + '</td>';
      q.cols.forEach(function(c, ci) {
        h += '<td><div class="mat-rd"><input type="radio" name="mat-' + k + '-' + ri + '" id="mat-' + k + '-' + ri + '-' + ci + '" value="' + ci + '"></div></td>';
      });
      h += '</tr>';
    });
    h += '</tbody></table></div>';
  } else if (q.type === 'highlight') {
    h += '<div class="hl-wrap" id="hl-' + k + '">';
    q.sentences.forEach(function(s, i) {
      h += '<div class="hl-item" id="hl-' + k + '-' + i + '" data-key="' + k + '" data-idx="' + i + '" data-role="hl">' + s + '</div>';
    });
    h += '</div>';
  } else if (q.type === 'order') {
    h += '<p class="ord-hint">Click items in order (1 = first). Click again to deselect.</p><ul class="ord-list" id="ord-' + k + '">';
    q.items.forEach(function(item, i) {
      h += '<li class="ord-item" id="ord-' + k + '-' + i + '" data-key="' + k + '" data-idx="' + i + '" data-len="' + q.items.length + '" data-role="ord">'
        + '<div class="ord-badge" id="ord-b-' + k + '-' + i + '">?</div><span>' + item + '</span></li>';
    });
    h += '</ul>';
  }

  h += '<button class="sub-btn" id="sub-ngn-' + k + '" data-key="' + k + '" data-role="sub-ngn">Submit Answer</button>'
     + '<div class="rat" id="rat-ngn-' + k + '"><strong>Rationale:</strong> ' + q.rationale + '</div>';
  return h;
}

function attachNGNEvents(q, k) {
  /* checkbox/radio opts */
  q.options && q.options.forEach(function(o, i) {
    var optEl = el('emr-opt-' + k + '-' + i);
    if (optEl) optEl.addEventListener('click', function() { toggleEMR(k, i); });
  });
  q.actions_left && q.actions_left.forEach(function(a, i) {
    var e = el('bta-' + k + '-' + i);
    if (e) e.addEventListener('click', function() { toggleCheck('bta', k, i, 'bta-chk'); });
  });
  q.conditions && q.conditions.forEach(function(c, i) {
    var e = el('btc-' + k + '-' + i);
    if (e) e.addEventListener('click', function() { selectSingle('btc', k, i, q.conditions.length); });
  });
  q.parameters && q.parameters.forEach(function(p, i) {
    var e = el('btp-' + k + '-' + i);
    if (e) e.addEventListener('click', function() { toggleCheck('btp', k, i, 'btp-chk'); });
  });
  q.sentences && q.sentences.forEach(function(s, i) {
    var e = el('hl-' + k + '-' + i);
    if (e) e.addEventListener('click', function() { toggleHL(k, i); });
  });
  if (q.type === 'order') {
    q.items.forEach(function(item, i) {
      var e = el('ord-' + k + '-' + i);
      if (e) e.addEventListener('click', function() { clickOrd(k, i, q.items.length); });
    });
  }
  var subBtn = el('sub-ngn-' + k);
  if (subBtn) subBtn.addEventListener('click', function() { submitNGN(k); });
}

function isLocked(k) { return el('rat-ngn-' + k).classList.contains('show'); }

function toggleEMR(k, i) {
  if (isLocked(k)) return;
  var opt = el('emr-opt-' + k + '-' + i);
  var chk = el('emr-chk-' + k + '-' + i);
  var on = opt.classList.toggle('sel');
  chk.textContent = on ? '\u2611' : '\u2610';
}

function toggleCheck(prefix, k, i, chkPrefix) {
  if (isLocked(k)) return;
  var opt = el(prefix + '-' + k + '-' + i);
  var chk = el(chkPrefix + '-' + k + '-' + i);
  var on = opt.classList.toggle('sel');
  chk.textContent = on ? '\u2611' : '\u2610';
}

function selectSingle(prefix, k, i, len) {
  if (isLocked(k)) return;
  for (var j = 0; j < len; j++) {
    var e = el(prefix + '-' + k + '-' + j);
    if (e) e.classList.remove('sel');
  }
  el(prefix + '-' + k + '-' + i).classList.add('sel');
}

function toggleHL(k, i) {
  if (isLocked(k)) return;
  el('hl-' + k + '-' + i).classList.toggle('sel');
}

function clickOrd(k, i, len) {
  if (isLocked(k)) return;
  if (!ordState[k]) ordState[k] = {};
  var st = ordState[k];
  if (st[i] !== undefined) {
    var rm = st[i];
    delete st[i];
    for (var j in st) { if (st[j] > rm) st[j]--; }
    el('ord-b-' + k + '-' + i).textContent = '?';
    el('ord-' + k + '-' + i).classList.remove('picked');
    for (var j2 in st) { el('ord-b-' + k + '-' + j2).textContent = st[j2]; }
  } else {
    var n = Object.keys(st).length + 1;
    st[i] = n;
    el('ord-b-' + k + '-' + i).textContent = n;
    el('ord-' + k + '-' + i).classList.add('picked');
  }
}

function submitNGN(k) {
  var rat = el('rat-ngn-' + k);
  if (rat.classList.contains('show')) return;
  var q = NGN_DATA.find(function(x){ return qkey(x) === k; });
  if (!q) return;
  rat.classList.add('show');
  el('sub-ngn-' + k).disabled = true;
  var ok = false;

  if (q.type === 'emr') {
    var cset = {}; q.correct.forEach(function(c){ cset[c]=true; });
    var sel = q.options.filter(function(o,i){ return el('emr-opt-'+k+'-'+i).classList.contains('sel'); });
    ok = sel.length === q.correct.length && sel.every(function(s){ return cset[s]; });
    q.options.forEach(function(o,i){
      var e = el('emr-opt-'+k+'-'+i);
      var isSel = e.classList.contains('sel');
      e.classList.remove('sel');
      if (isSel && cset[o]) e.classList.add('corr');
      else if (isSel) e.classList.add('wrong');
      else if (cset[o]) e.classList.add('miss');
    });

  } else if (q.type === 'bowtie') {
    var ci = -1;
    q.conditions.forEach(function(c,i){ if(el('btc-'+k+'-'+i).classList.contains('sel')) ci=i; });
    ok = ci >= 0 && q.conditions[ci] === q.correct_condition;
    q.conditions.forEach(function(c,i){
      var e = el('btc-'+k+'-'+i); e.classList.remove('sel');
      if(c===q.correct_condition) e.classList.add('corr'); else if(i===ci) e.classList.add('wrong');
    });
    var as = {}; q.correct_actions.forEach(function(a){ as[a]=true; });
    q.actions_left.forEach(function(a,i){
      var e=el('bta-'+k+'-'+i); var isSel=e.classList.contains('sel'); e.classList.remove('sel');
      if(isSel&&as[a]) e.classList.add('corr'); else if(isSel) e.classList.add('wrong'); else if(as[a]) e.classList.add('miss');
    });
    var ps = {}; q.correct_parameters.forEach(function(p){ ps[p]=true; });
    q.parameters.forEach(function(p,i){
      var e=el('btp-'+k+'-'+i); var isSel=e.classList.contains('sel'); e.classList.remove('sel');
      if(isSel&&ps[p]) e.classList.add('corr'); else if(isSel) e.classList.add('wrong'); else if(ps[p]) e.classList.add('miss');
    });

  } else if (q.type === 'dropdown') {
    var allOk = true;
    q.blanks.forEach(function(b,bi){
      var s = el('dd-'+k+'-'+bi);
      if (!s) return;
      if (s.value === b.correct) s.classList.add('corr');
      else { s.classList.add('wrong'); allOk = false; }
    });
    ok = allOk;

  } else if (q.type === 'matrix') {
    var matOk = true;
    q.rows.forEach(function(row,ri){
      var ci2 = q.cols.indexOf(q.correct[ri]);
      var chk2 = document.querySelector('input[name="mat-'+k+'-'+ri+'"]:checked');
      if (!chk2 || parseInt(chk2.value) !== ci2) matOk = false;
    });
    ok = matOk;

  } else if (q.type === 'highlight') {
    var hset = {}; q.correct.forEach(function(c){ hset[c]=true; });
    var hsel = q.sentences.filter(function(s,i){ return el('hl-'+k+'-'+i).classList.contains('sel'); });
    ok = hsel.length===q.correct.length && hsel.every(function(s){ return hset[s]; });
    q.sentences.forEach(function(s,i){
      var e=el('hl-'+k+'-'+i); var isSel=e.classList.contains('sel'); e.classList.remove('sel');
      if(isSel&&hset[s]) e.classList.add('corr'); else if(isSel) e.classList.add('wrong'); else if(hset[s]) e.classList.add('miss');
    });

  } else if (q.type === 'order') {
    var st2 = ordState[k]||{};
    var arr = new Array(q.items.length).fill(null);
    for (var ki in st2) { arr[parseInt(st2[ki])-1] = q.items[parseInt(ki)]; }
    ok = JSON.stringify(arr) === JSON.stringify(q.correct_order);
    q.items.forEach(function(item,i){
      var e=el('ord-'+k+'-'+i); e.classList.remove('picked');
      var myN = st2[i];
      if (myN !== undefined) {
        if (q.correct_order[myN-1] === item) e.classList.add('corr'); else e.classList.add('wrong');
      }
    });
  }

  ngnAns[k] = ok;
  showBanner('rat-ngn-' + k, ok);
  updateScores();
}

/* ===================== NCLEX ===================== */
function renderNCLEX() {
  var qs = nclexFilter === 'all' ? NCLEX_DATA : NCLEX_DATA.filter(function(q){ return q.ch === nclexFilter; });
  var list = el('nclex-list');
  list.innerHTML = '';
  if (!qs.length) { list.innerHTML = '<div class="no-q">No questions.</div>'; return; }
  qs.forEach(function(q, idx) {
    var k = nqkey(q);
    var card = document.createElement('div');
    card.className = 'qcard';
    card.id = 'nclex-card-' + k;
    var optsHTML = '';
    q.opts.forEach(function(o, i) {
      optsHTML += '<div class="opt" id="nopt-' + k + '-' + i + '" data-key="' + k + '" data-idx="' + i + '">'
        + '<span class="opt-ltr">' + o[0] + '.</span><span>' + o.slice(3) + '</span></div>';
    });
    card.innerHTML = '<div class="q-hdr">'
      + '<span class="badge badge-num">#' + (idx+1) + ' ' + q.ch + ' Q' + q.n + '</span>'
      + '<span class="badge" style="background:#27ae60">Advanced NCLEX</span></div>'
      + '<div class="q-stem">' + q.stem + '</div>'
      + '<div class="opts">' + optsHTML + '</div>'
      + '<button class="sub-btn" id="sub-nclex-' + k + '">Submit Answer</button>'
      + '<div class="rat" id="rat-nclex-' + k + '"><strong>Rationale:</strong> ' + q.rat + '</div>';
    list.appendChild(card);
    /* attach events */
    q.opts.forEach(function(o, i) {
      var e = el('nopt-' + k + '-' + i);
      if (e) e.addEventListener('click', function() { selNCLEX(k, i, q.opts.length); });
    });
    el('sub-nclex-' + k).addEventListener('click', function() { subNCLEX(k, q); });
  });
  updateScores();
}

function selNCLEX(k, i, len) {
  if (el('rat-nclex-' + k).classList.contains('show')) return;
  for (var j = 0; j < len; j++) { var e = el('nopt-'+k+'-'+j); if(e) e.classList.remove('sel'); }
  el('nopt-'+k+'-'+i).classList.add('sel');
  nclexSel[k] = i;
}

function subNCLEX(k, q) {
  var rat = el('rat-nclex-' + k);
  if (rat.classList.contains('show')) return;
  var si = nclexSel[k];
  if (si === undefined) { alert('Please select an answer.'); return; }
  rat.classList.add('show');
  el('sub-nclex-' + k).disabled = true;
  var ok = q.opts[si][0] === q.ans;
  q.opts.forEach(function(o, i) {
    var e = el('nopt-'+k+'-'+i); e.classList.remove('sel');
    if (o[0] === q.ans) e.classList.add('corr');
    else if (i === si && !ok) e.classList.add('wrong');
  });
  nclexAns[k] = ok;
  showBanner('rat-nclex-' + k, ok);
  updateScores();
}

/* ===================== SCORES ===================== */
function showBanner(ratId, ok) {
  var rat = el(ratId);
  var b = document.createElement('div');
  b.className = 'result ' + (ok ? 'ok' : 'fail');
  b.innerHTML = ok ? '&#10003; Correct!' : '&#10007; Incorrect &mdash; see rationale.';
  rat.parentNode.insertBefore(b, rat);
}

function scoreNGN(filter) {
  var qs = filter === 'all' ? NGN_DATA : NGN_DATA.filter(function(q){ return q.chapter===filter; });
  var ans = qs.filter(function(q){ return ngnAns[qkey(q)] !== undefined; }).length;
  var corr = qs.filter(function(q){ return ngnAns[qkey(q)] === true; }).length;
  return {total:qs.length, ans:ans, corr:corr, pct:ans>0?Math.round(corr/ans*100):0};
}
function scoreNCLEX(filter) {
  var qs = filter === 'all' ? NCLEX_DATA : NCLEX_DATA.filter(function(q){ return q.ch===filter; });
  var ans = qs.filter(function(q){ return nclexAns[nqkey(q)] !== undefined; }).length;
  var corr = qs.filter(function(q){ return nclexAns[nqkey(q)] === true; }).length;
  return {total:qs.length, ans:ans, corr:corr, pct:ans>0?Math.round(corr/ans*100):0};
}

function updateScores() {
  var ng = scoreNGN(ngnFilter);
  el('ngn-scores').innerHTML = sc(ng.total,'Total') + sc(ng.ans,'Answered') + sc(ng.corr,'Correct') + sc(ng.pct+'%','Score');
  el('ngn-prog').style.width = (ng.total>0?ng.ans/ng.total*100:0)+'%';
  var nc = scoreNCLEX(nclexFilter);
  el('nclex-scores').innerHTML = sc(nc.total,'Total') + sc(nc.ans,'Answered') + sc(nc.corr,'Correct') + sc(nc.pct+'%','Score');
  el('nclex-prog').style.width = (nc.total>0?nc.ans/nc.total*100:0)+'%';
}
function sc(n,l){ return '<div class="sc"><div class="n">'+n+'</div><div class="l">'+l+'</div></div>'; }

function buildSummary() {
  var chs = [
    {ng:'Chapter 14',nc:'Ch 14',lbl:'Chapter 14: Fetal Surveillance'},
    {ng:'Chapter 15',nc:'Ch 15',lbl:'Chapter 15: Labor & Birth'},
    {ng:'Chapter 16',nc:'Ch 16',lbl:'Chapter 16: Intrapartum Complications'},
    {ng:'Chapter 17',nc:'Ch 17',lbl:'Chapter 17: Postpartum Adaptations'},
    {ng:'Chapter 18',nc:'Ch 18',lbl:'Chapter 18: Postpartum Complications'}
  ];
  var html = '';
  chs.forEach(function(ch) {
    var ng = scoreNGN(ch.ng), nc = scoreNCLEX(ch.nc);
    html += '<div class="sum-ch"><h3>'+ch.lbl+'</h3><div class="sum-row">'
      + stat('NGN Answered', ng.ans+'/'+ng.total, false)
      + stat('NGN Score', ng.corr+' ('+ng.pct+'%)', ng.ans>0&&ng.pct>=70)
      + stat('NCLEX Answered', nc.ans+'/'+nc.total, false)
      + stat('NCLEX Score', nc.corr+' ('+nc.pct+'%)', nc.ans>0&&nc.pct>=70)
      + '</div></div>';
  });
  el('sum-content').innerHTML = html;
}
function stat(l,v,good){ return '<div class="sum-stat"><div class="sl">'+l+'</div><div class="sv '+(good?'ok':'')+'">'+v+'</div></div>'; }

/* ---- init ---- */
renderNGN();
renderNCLEX();
updateScores();
</script>
</body>
</html>
