tpartum patient on day 3 after cesarean birth reports left leg pain, swelling, and warmth. The leg appears red and edematous. Select ALL correct nursing actions.","options":["Vigorously massage the affected leg","Elevate the affected leg","Assess for Homans sign by dorsiflexing the foot","Notify the HCP","Prepare for venous ultrasound or Doppler","Apply warm compresses as ordered","Begin anticoagulation therapy as ordered","Maintain bedrest and avoid early ambulation"],"correct":["Elevate the affected leg","Notify the HCP","Prepare for venous ultrasound or Doppler","Apply warm compresses as ordered","Begin anticoagulation therapy as ordered"],"rationale":"DVT assessment and management: do NOT massage the affected limb (dislodges clot \u2192 PE risk). Elevate, notify HCP, diagnostic testing (ultrasound/Doppler), anticoagulation (heparin/Lovenox). Note: Homans sign (calf pain with dorsiflexion) is no longer considered reliable and many clinical guidelines have moved away from it as a diagnostic tool. Early ambulation prevents DVT \u2014 bedrest does NOT. The nurse should facilitate safe ambulation while managing the acute DVT.","chapter":"Chapter 18"},{"type":"highlight","num":6,"stem":"A patient 2 days after cesarean birth suddenly develops dyspnea, tachycardia at 126 bpm, sudden sharp right-sided chest pain, and O2 saturation drops from 98% to 87%. She coughs up a small amount of blood-tinged sputum. Select ALL findings consistent with pulmonary embolism.","sentences":["Dyspnea","Tachycardia at 126 bpm","Sudden sharp right-sided chest pain","O2 saturation drops from 98% to 87%","Small amount of blood-tinged sputum (hemoptysis)"],"correct":["Dyspnea","Tachycardia at 126 bpm","Sudden sharp right-sided chest pain","O2 saturation drops from 98% to 87%","Small amount of blood-tinged sputum (hemoptysis)"],"rationale":"Classic PE presentation: dyspnea, tachycardia, sudden sharp chest pain, hemoptysis, tachypnea, decreasing O2 saturation, possible pulmonary crackles, low-grade fever, abdominal pain. ALL findings listed = PE. Priority intervention: O2 via NRB 8\u201310 L/min (oxygenation is priority), notify HCP immediately, anticoagulation therapy. C-section + immobility + elevated clotting factors = high DVT/PE risk postpartum.","chapter":"Chapter 18"},{"type":"emr","num":7,"stem":"A nurse is caring for a patient on postpartum day 4 who develops fever of 102.4\u00b0F, foul-smelling brown lochia, uterine tenderness, soft/boggy fundus higher than expected for day 4, chills, and malaise. Select ALL expected nursing interventions.","options":["Obtain blood and urine cultures before starting antibiotics","Administer clindamycin and gentamicin IV as ordered","Encourage ambulation and oral fluids to promote drainage","Monitor lochia for color, odor, and amount","Administer misoprostol rectal for uterine atony","Teach perineal hygiene and handwashing","Administer oxytocics to assist involution"],"correct":["Obtain blood and urine cultures before starting antibiotics","Administer clindamycin and gentamicin IV as ordered","Encourage ambulation and oral fluids to promote drainage","Monitor lochia for color, odor, and amount","Teach perineal hygiene and handwashing","Administer oxytocics to assist involution"],"rationale":"Endometritis (uterine infection): within first week PP, risk factors include c-section, prolonged ROM, frequent vaginal exams, retained tissue. Signs: foul-smelling lochia (brown/purulent), subinvolution, tender/boggy fundus, fever, chills, leukocytosis. Treatment: cultures first \u2192 IV broad-spectrum antibiotics (Clindamycin + Gentamicin) \u2192 ambulation/fluids \u2192 monitor lochia \u2192 oxytocics to assist involution \u2192 hygiene teaching. Misoprostol rectal is for uterine atony hemorrhage, not infection.","chapter":"Chapter 18"},{"type":"dropdown","num":8,"stem":"A patient at high risk for DVT is started on Lovenox (enoxaparin) at 28 weeks gestation for prophylaxis. The nurse knows that Lovenox must be stopped at [BLANK1] because [BLANK2]. At that point, the patient should be switched to [BLANK3].","blanks":[{"id":"BLANK1","options":["32 weeks","34 weeks","36 weeks","38 weeks"],"correct":"36 weeks"},{"id":"BLANK2","options":["Lovenox causes fetal bone defects after 36 weeks","Lovenox is contraindicated with epidural anesthesia","Lovenox increases the risk of postpartum hemorrhage","Lovenox crosses the placenta after 36 weeks"],"correct":"Lovenox is contraindicated with epidural anesthesia"},{"id":"BLANK3","options":["aspirin","warfarin","unfractionated heparin","calcium gluconate"],"correct":"unfractionated heparin"}],"rationale":"From the slides: Lovenox (low molecular weight heparin) must be stopped at 36 weeks and switched to unfractionated heparin because Lovenox is CONTRAINDICATED with epidural anesthesia. Unfractionated heparin has a shorter half-life and can be more easily managed/reversed around the time of epidural placement and delivery. This is a critical medication safety point for high-risk OB patients.","chapter":"Chapter 18"},{"type":"emr","num":9,"stem":"A nurse is assessing a postpartum patient at 1 hour after vaginal delivery. The nurse identifies signs of hypovolemic shock. Select ALL expected clinical manifestations of hypovolemic shock in the postpartum patient.","options":["Tachycardia (earliest sign)","Hypotension","Increased respiratory rate","Pale, cool, clammy skin","Anxiety, confusion, or lethargy","Bradycardia","Bounding peripheral pulses","Warm, flushed skin"],"correct":["Tachycardia (earliest sign)","Hypotension","Increased respiratory rate","Pale, cool, clammy skin","Anxiety, confusion, or lethargy"],"rationale":"Hypovolemic shock signs from the slides: tachycardia (EARLIEST sign \u2014 appears before hypotension), hypotension, increased RR, pale/cool/clammy skin, anxiety/confusion/lethargy. NOT bradycardia (that is late or terminal sign). NOT bounding pulses (those are from fluid overload). NOT warm flushed skin (that indicates distributive/septic shock). Goal: maintain UO \u226530 mL/hr; second large-bore IV; fluids + blood products; vasopressors for refractory hypotension.","chapter":"Chapter 18"},{"type":"matrix","num":10,"stem":"Match each postpartum infection type with its key distinguishing features.","rows":["Endometritis","Mastitis","Wound infection (incision)","UTI (Cystitis)"],"cols":["Foul-smelling lochia, subinvolution, uterine tenderness, fever","Localized breast warmth/redness/tenderness, body aches, fever, continue breastfeeding","Incision redness, purulent drainage, wound edges not approximated, fever","Frequency, urgency, dysuria, hematuria, suprapubic pain, fever"],"correct":["Foul-smelling lochia, subinvolution, uterine tenderness, fever","Localized breast warmth/redness/tenderness, body aches, fever, continue breastfeeding","Incision redness, purulent drainage, wound edges not approximated, fever","Frequency, urgency, dysuria, hematuria, suprapubic pain, fever"],"rationale":"Each infection has a distinct clinical signature: Endometritis = uterine/lochia signs. Mastitis = breast-specific; importantly, breastfeeding should CONTINUE with mastitis (reduces engorgement, does not harm infant). Wound infection = REEDA abnormalities (drainage, approximation issues). UTI = urinary symptoms. All may present with fever, chills, tachycardia, elevated WBC. Treatment is antibiotics appropriate to the infection site.","chapter":"Chapter 18"},{"type":"emr","num":11,"stem":"A nurse is reviewing risk factors for postpartum hemorrhage before a patient delivers. Select ALL conditions from this patient's history that are risk factors for PPH.","options":["Grand multiparity (G6P5)","Macrosomic fetus (estimated 9 lb 10 oz)","Prolonged labor of 24 hours","Oxytocin infusion for augmentation \u00d7 14 hours","Singleton pregnancy","Normal pre-delivery hematocrit of 38%","Placenta previa","Previous postpartum hemorrhage"],"correct":["Grand multiparity (G6P5)","Macrosomic fetus (estimated 9 lb 10 oz)","Prolonged labor of 24 hours","Oxytocin infusion for augmentation \u00d7 14 hours","Placenta previa","Previous postpartum hemorrhage"],"rationale":"PPH risk factors from the slides: grand multiparity (\u22655 = risk), macrosomia (overdistended uterus), prolonged labor, prolonged Pitocin use (uterine atony risk), placenta previa (hemorrhagic condition), previous PPH. Singleton pregnancy and normal hematocrit are not risk factors. This is one of the most tested concepts in postpartum nursing.","chapter":"Chapter 18"},{"type":"dropdown","num":12,"stem":"A patient delivered vaginally 30 minutes ago. The nurse assesses a firm fundus but notes a constant trickle of bright red lochia that does not slow down. The nurse's highest priority suspicion is [BLANK1] because [BLANK2]. The nurse's first action is to [BLANK3].","blanks":[{"id":"BLANK1","options":["uterine atony","laceration of the cervix or birth canal","retained placental fragments","coagulopathy"],"correct":"laceration of the cervix or birth canal"},{"id":"BLANK2","options":["a boggy fundus always means atony","a firm fundus with continued bleeding indicates the source is outside the uterus","retained placenta causes a distended boggy uterus","coagulopathy always presents with dark clotted blood"],"correct":"a firm fundus with continued bleeding indicates the source is outside the uterus"},{"id":"BLANK3","options":["massage the fundus","notify the provider immediately","administer methylergonovine","perform bimanual compression"],"correct":"notify the provider immediately"}],"rationale":"Slide states directly: 'If fundus is firm but there is still excessive bleeding, suspect birth canal laceration.' Cervical lacerations can easily go unnoticed and are the second most common cause of PPH (trauma). Firm fundus = uterus contracted normally = the bleeding source is a lacerated vessel in the birth canal, cervix, or perineum. The nurse cannot treat this \u2014 the provider must visualize and repair the laceration. Fundal massage is for atony (boggy fundus).","chapter":"Chapter 18"},{"type":"emr","num":13,"stem":"A nurse is caring for a patient at 36 hours postpartum after cesarean birth who develops a temperature of 102.6\u00b0F, right calf pain and swelling, dyspnea, and tachycardia of 118 bpm. Select ALL conditions the nurse should consider as potential diagnoses.","options":["Pulmonary embolism","Deep vein thrombosis","Endometritis","Normal postpartum leukocytosis","Mastitis","Wound infection"],"correct":["Pulmonary embolism","Deep vein thrombosis","Endometritis"],"rationale":"Multiple simultaneous signs: Calf pain/swelling = DVT. Dyspnea + tachycardia = PE (possible DVT that embolized). Fever + post-cesarean = endometritis risk. All three must be investigated simultaneously. Leukocytosis is normal in first 6 days PP \u2014 it's a finding, not a condition. No breast findings = mastitis not indicated. No incision drainage = wound infection not indicated (though incision should be assessed). C-section patients are at elevated risk for all three serious complications (DVT, PE, endometritis).","chapter":"Chapter 18"},{"type":"highlight","num":14,"stem":"A nurse reviews orders for a postpartum patient: 'Oxytocin 20 units in 500 mL NS IV infusion. Methylergonovine 0.2 mg IM q4h \u00d7 6 doses. Ibuprofen 600 mg PO q6h. Lovenox 40 mg SQ daily. Incentive spirometry q2h.' The patient has a history of hypertension (BP currently 158/96). Select ALL orders that require the nurse to contact the provider BEFORE administering.","sentences":["Oxytocin 20 units in 500 mL NS IV infusion","Methylergonovine 0.2 mg IM q4h \u00d7 6 doses","Ibuprofen 600 mg PO q6h","Lovenox 40 mg SQ daily","Incentive spirometry q2h"],"correct":["Methylergonovine 0.2 mg IM q4h \u00d7 6 doses"],"rationale":"Methylergonovine (Methergine) is CONTRAINDICATED in hypertensive patients because it causes vasoconstriction and increases blood pressure \u2014 this could precipitate hypertensive crisis, stroke, or eclampsia. With BP 158/96, the nurse MUST contact the provider before giving Methergine. Oxytocin in NS is appropriate. Ibuprofen is generally avoided in hypertension but is not absolutely contraindicated like Methergine. Lovenox is appropriate for DVT prophylaxis post-c-section. Incentive spirometry is standard post-op care.","chapter":"Chapter 18"},{"type":"emr","num":15,"stem":"A nurse is educating a postpartum patient about DVT prevention before discharge. Select ALL correct teaching points.","options":["Remain on bedrest for 2 weeks after discharge to allow healing","Perform leg exercises and walk regularly","Wear compression stockings as prescribed","Report any calf pain, swelling, redness, or warmth immediately","Avoid oral contraceptives with estrogen for at least 6 weeks (increases clot risk)","Drink plenty of fluids to maintain hydration","The increased clotting risk disappears immediately after delivery"],"correct":["Perform leg exercises and walk regularly","Wear compression stockings as prescribed","Report any calf pain, swelling, redness, or warmth immediately","Avoid oral contraceptives with estrogen for at least 6 weeks (increases clot risk)","Drink plenty of fluids to maintain hydration"],"rationale":"DVT prevention teaching: early and regular ambulation (NOT bedrest \u2014 immobility is a major DVT risk factor), compression stockings, recognize and report DVT signs, hydration (dehydration increases clot risk), and avoid estrogen-containing contraceptives (increases coagulability \u2014 postpartum patients already have elevated clotting factors that normalize over 4\u20136 weeks). Coagulation factors do NOT return to normal immediately after delivery \u2014 they remain elevated for days to weeks.","chapter":"Chapter 18"}];
var NCLEX_DATA = [{"ch":"Ch 14","n":1,"stem":"A nurse is monitoring a laboring patient at 39 weeks on Pitocin 8 mU/min. The FHR strip shows: baseline 148 bpm, variability 4 bpm, no accelerations in 45 minutes, late decelerations \u00d7 5 in the past 30 minutes. The nurse's MOST immediate priority action is:","opts":["A. Perform fetal scalp stimulation to elicit an acceleration","B. Stop the Pitocin, reposition left, apply O2 via NRB, notify HCP","C. Decrease the Pitocin to 4 mU/min and reassess in 15 minutes","D. Prepare for immediate cesarean delivery"],"ans":"B","rat":"This is a non-reassuring strip: minimal variability (4 bpm \u2264 5) + no accelerations + late decelerations = placental insufficiency pattern. Full LION PIT is required \u2014 stopping Pitocin is part of this (P = Pitocin off). Fetal scalp stimulation cannot be done during decelerations (A). Decreasing Pitocin (C) is insufficient \u2014 it must be stopped. Immediate cesarean (D) is premature before conservative measures are tried."},{"ch":"Ch 14","n":2,"stem":"A patient in active labor at 7 cm has an epidural placed. Twenty minutes later, the nurse notes the FHR drops to 65 bpm, sustained for 3 minutes. Maternal BP is 78/46. The MOST likely cause is:","opts":["A. Cord compression from increased fetal descent","B. Maternal supine hypotension causing reduced placental perfusion","C. Head compression from rapid dilation","D. Placental abruption from epidural placement"],"ans":"B","rat":"Epidurals cause vasodilation and can cause maternal hypotension (BP 78/46 confirms this). Supine positioning compounds this via aortocaval compression. Reduced maternal BP \u2192 reduced placental perfusion \u2192 fetal bradycardia. LION PIT applies, especially repositioning left lateral (relieves aortocaval compression) and IV bolus. Cord compression (A) presents as variable decelerations. Head compression (C) causes early decelerations. Epidurals do not cause abruption (D)."},{"ch":"Ch 14","n":3,"stem":"A nurse notes the FHR has been at 72 bpm for 11 minutes. The patient is at 38 weeks and is NOT on Pitocin. How should the nurse classify this finding?","opts":["A. A prolonged deceleration \u2014 implement LION PIT","B. A baseline change \u2014 this is now a new (bradycardic) baseline requiring escalated response","C. A variable deceleration \u2014 perform vaginal exam","D. Early deceleration \u2014 no intervention needed"],"ans":"B","rat":"A prolonged deceleration lasts 2\u201310 minutes. After 10 minutes, it is classified as a BASELINE CHANGE, not a deceleration. At 11 minutes, this is now a new bradycardic baseline \u2014 an escalation requiring emergency response beyond standard LION PIT (provider at bedside, preparation for emergency delivery). This is a critical distinction on NCLEX."},{"ch":"Ch 14","n":4,"stem":"A multiparous patient is in active labor at 8 cm. The FHR strip shows smooth, gradual decelerations that mirror every contraction exactly, reaching a nadir of 130 bpm at the contraction peak. Between contractions, the FHR returns to 145 bpm with moderate variability. The nurse's best action is:","opts":["A. Implement LION PIT \u2014 these are late decelerations","B. Prepare for amnioinfusion \u2014 cord compression is occurring","C. Continue routine monitoring \u2014 this is an expected finding","D. Notify the HCP of a non-reassuring pattern"],"ans":"C","rat":"The pattern described perfectly matches early decelerations: smooth, gradual, MIRRORS the contraction exactly (onset and return mirrors contraction shape), moderate variability between. VEAL CHOP: E = Early, H = Head compression. This is benign in active labor as the head compresses against the cervix with each contraction. No intervention is needed (A and D are incorrect). Amnioinfusion is for cord compression/meconium (B)."},{"ch":"Ch 14","n":5,"stem":"A patient's FHR strip shows: baseline 162 bpm \u00d7 15 minutes. The patient is at 37 weeks, received IV fentanyl 30 minutes ago, is afebrile, and her membranes are intact. What is the MOST important nursing assessment to perform?","opts":["A. Assess for signs of chorioamnionitis","B. Consider fentanyl as a potential cause and reassess after it clears","C. Initiate LION PIT immediately","D. Notify HCP of pathologic tachycardia requiring delivery"],"ans":"B","rat":"At 37 weeks (term), FHR >160 = tachycardia. However, fentanyl (opioid) can cause FHR changes including transient tachycardia. The patient is afebrile with no infection signs, making chorioamnionitis less likely (though should be monitored). With a known causative agent, the priority is to consider the medication's effect, continue monitoring, and reassess as the drug clears. LION PIT is for decelerations, not isolated tachycardia. Immediate delivery is not indicated."},{"ch":"Ch 14","n":6,"stem":"The IUPC reading shows: contraction frequency q3 min, duration 65 sec, resting tone 8 mmHg. By palpation the uterus fully relaxes between contractions. The FHR shows moderate variability with no decelerations. How should the nurse interpret these findings?","opts":["A. Tachysystole is present \u2014 reduce Pitocin","B. Uterine activity and FHR are both normal","C. Resting tone is elevated \u2014 administer terbutaline","D. Duration >60 sec indicates tachysystole"],"ans":"B","rat":"Normal UA = \u22645 ctx/10 min. Frequency q3 min = normal. Duration 65 sec = within normal limits (tachysystole criterion is >120 sec). Resting tone 8 mmHg = normal by IUPC. Full relaxation by palpation confirms no abnormal resting tone. FHR with moderate variability and no decelerations = reassuring. All findings are normal. Duration >60 sec alone does not = tachysystole (>120 sec is the threshold)."},{"ch":"Ch 14","n":7,"stem":"A nurse is about to perform fetal scalp stimulation on a patient with no spontaneous accelerations in 30 minutes. The current FHR shows: baseline 136 bpm, minimal variability (3 bpm), no decelerations. What additional assessment must the nurse confirm before proceeding?","opts":["A. Patient has received a reactive NST within the past hour","B. No active deceleration is occurring at the time of stimulation","C. The FHR baseline is above 140 bpm","D. Amniotomy has been performed to allow direct fetal access"],"ans":"B","rat":"The slides explicitly state: 'Do NOT perform fetal scalp stimulation during deceleration.' The key safety check is confirming NO active deceleration is present at the moment of stimulation. There is no requirement for a prior NST, a specific baseline number, or amniotomy. Fetal scalp stimulation can be performed transcervically with intact membranes once the cervix is dilated."},{"ch":"Ch 14","n":8,"stem":"A nurse caring for a patient with PPROM at 29 weeks places an FSE to better monitor FHR. Three hours later, the FHR baseline has been 168 bpm \u00d7 20 min, with minimal variability and no accelerations. The patient has a temperature of 100.8\u00b0F. The PRIORITY nursing concern is:","opts":["A. The FSE is causing the tachycardia \u2014 remove and switch to external monitor","B. The pattern suggests chorioamnionitis with fetal tachycardia as an early sign","C. This is expected fetal tachycardia of prematurity \u2014 continue routine monitoring","D. Minimal variability after PPROM is always caused by narcotics"],"ans":"B","rat":"Fetal tachycardia (168 bpm) + minimal variability + no accelerations + maternal fever (100.8\u00b0F) + PPROM = chorioamnionitis with fetal tachycardia as an early sign of maternal infection. Fetal tachycardia is often the FIRST sign of maternal infection. This requires immediate HCP notification, blood cultures, and broad-spectrum antibiotics (Ampicillin + Gentamicin). FSEs do not cause tachycardia (A). Tachycardia of prematurity does not explain the maternal fever (C)."},{"ch":"Ch 14","n":9,"stem":"After amnioinfusion is initiated via IUPC for recurrent variable decelerations, the nurse observes the variable decelerations have resolved. The FHR is 142 with moderate variability. What is the nurse's best next action?","opts":["A. Stop the amnioinfusion \u2014 the problem has resolved","B. Continue the amnioinfusion as ordered and monitor FHR continuously","C. Remove the IUPC \u2014 internal monitoring is no longer needed","D. Perform a vaginal exam to assess for cord prolapse"],"ans":"B","rat":"Amnioinfusion for cord compression: the resolution of variable decelerations confirms the infusion is working \u2014 the fluid is cushioning the cord. The nurse continues the infusion as ordered and maintains continuous FHR monitoring to ensure the effect is sustained. Stopping the infusion prematurely (A) may cause the decelerations to return. The IUPC must remain in place to continue the infusion. Vaginal exam would be done if decelerations had NOT resolved."},{"ch":"Ch 14","n":10,"stem":"A nurse is caring for a patient at 41 weeks who has been on Pitocin for 10 hours. The strip now shows: baseline 152, marked variability (>25 bpm), and accelerations. The nurse should:","opts":["A. Notify the HCP \u2014 marked variability indicates fetal compromise","B. Document the finding and continue monitoring \u2014 this is reassuring with context","C. Stop the Pitocin \u2014 marked variability indicates tachysystole","D. Administer O2 via NRB \u2014 marked variability is non-reassuring"],"ans":"B","rat":"Marked variability (>25 bpm) is classified as abnormal, but when accompanied by accelerations and a normal baseline, the overall pattern must be interpreted in context. The MOST reassuring features here are the accelerations (intact CNS) and normal baseline. Marked variability in isolation without decelerations, with accelerations present, is typically monitored carefully rather than triggering emergency intervention. The key NCLEX point: variability is evaluated in the context of the whole strip."},{"ch":"Ch 14","n":11,"stem":"A nurse reviews a strip showing late decelerations with ABSENT variability. Compared to late decelerations with MODERATE variability, this is MORE concerning because:","opts":["A. Absent variability indicates the fetus is in a sleep cycle","B. Absent variability combined with late decelerations suggests severe fetal compromise with possible CNS involvement","C. Absent variability is expected during the second stage of labor","D. Late decelerations with absent variability mean delivery must occur by cesarean within 5 minutes"],"ans":"B","rat":"Late decelerations alone (with moderate variability) = placental insufficiency pattern requiring LION PIT. Late decelerations WITH absent variability = the most concerning combination, suggesting the fetal CNS is being affected by hypoxia. Absent variability is undetectable beat-to-beat change \u2014 the most serious category. This combination warrants the most urgent response. Sleep cycles cause minimal variability (\u22645), not absent. Absent variability is never 'expected' in labor."},{"ch":"Ch 14","n":12,"stem":"During active labor, the nurse identifies: FHR 155 bpm, variability 10 bpm, accelerations present \u00d7 3 in 20 minutes, early decelerations with each contraction. The provider asks the nurse to summarize the strip. The most accurate summary is:","opts":["A. Non-reassuring strip with early decelerations requiring LION PIT","B. Reassuring strip \u2014 normal baseline, moderate variability, accelerations, early decelerations are benign","C. Indeterminate strip \u2014 accelerations present but early decelerations require intervention","D. Non-reassuring due to absence of late decelerations"],"ans":"B","rat":"Strip interpretation: FHR 155 (normal 110\u2013160) + variability 10 bpm (moderate = 6\u201325 = reassuring) + accelerations (sign of fetal well-being/intact CNS) + early decelerations (mirror contractions = head compression = benign = NO intervention). This is a REASSURING strip overall. Early decelerations never require LION PIT (A is wrong). A reassuring strip cannot be indeterminate (C). D is nonsensical."},{"ch":"Ch 14","n":13,"stem":"A nurse notes variable decelerations on the monitor. After implementing full LION PIT interventions including repositioning, O2, IV bolus, stopping Pitocin, and performing a vaginal exam (no cord prolapse found), the variable decelerations persist. What should the nurse do NEXT?","opts":["A. Document findings and reassess in 20 minutes","B. Restart Pitocin at the same rate since cord prolapse was ruled out","C. Administer terbutaline 0.25 mg SQ as ordered and maintain the other interventions","D. Remove the internal monitor \u2014 it may be causing the decelerations"],"ans":"C","rat":"LION PIT T = Tocolytic (terbutaline 0.25 mg SQ). After ruling out cord prolapse (vaginal exam was negative) and implementing all other LION PIT steps, the next step is the tocolytic to reduce uterine activity (which may be causing intermittent cord compression). Documenting and waiting (A) is not appropriate for persistent non-reassuring patterns. Restarting Pitocin (B) would worsen the pattern. Internal monitors do not cause decelerations (D)."},{"ch":"Ch 14","n":14,"stem":"A patient receives IV morphine for pain management. Fifteen minutes later, the FHR shows: baseline 138 bpm (unchanged), variability changed from 12 to 3 bpm, no decelerations, no accelerations. The nurse's BEST action is:","opts":["A. Initiate LION PIT \u2014 minimal variability requires immediate intervention","B. Perform fetal scalp stimulation to assess if this is medication-related or fetal compromise","C. Notify HCP of urgent fetal compromise","D. Increase IV fluids \u2014 dehydration is causing the variability change"],"ans":"B","rat":"Morphine is a narcotic known to suppress FHR variability. Minimal variability alone after narcotics may be drug-induced. Fetal scalp stimulation can differentiate: if the fetus is well-oxygenated (drug-induced), stimulation will elicit an acceleration. If there is no response, fetal compromise is more likely. Note: scalp stimulation is appropriate here because there are NO ACTIVE DECELERATIONS. LION PIT (A) is for decelerations, not isolated variability changes with known pharmacologic cause."},{"ch":"Ch 14","n":15,"stem":"A nurse is caring for twins at 35 weeks. Twin A has moderate variability and accelerations. Twin B has minimal variability and no accelerations but no decelerations. The MOST appropriate nursing action for Twin B is:","opts":["A. Continue routine monitoring \u2014 findings are the same for both twins","B. Notify the HCP specifically about Twin B's strip \u2014 minimal variability and no accelerations warrant further evaluation","C. Initiate LION PIT for Twin B immediately","D. Perform amnioinfusion for Twin B to improve oxygenation"],"ans":"B","rat":"Twin B's strip (minimal variability + no accelerations) is different from Twin A and is a concerning pattern warranting provider notification and further evaluation. It could be a sleep cycle, medication effect, or early compromise \u2014 the HCP must be informed. LION PIT (C) is for decelerations. Amnioinfusion (D) is for recurrent variable decelerations or meconium, not for variability changes alone. Saying both strips are the same (A) is incorrect."},{"ch":"Ch 15","n":1,"stem":"A G1P0 patient at 41 weeks is being induced with Pitocin. Her Bishop score was 2 at the start. Four hours into the induction, her cervix is 1 cm/30%/-3. The nurse recognizes this as:","opts":["A. Normal progress for a primigravida induction","B. An unfavorable cervix that may benefit from cervical ripening agents before oxytocin","C. An indication to double the Pitocin dose immediately","D. An indication for emergency cesarean for failed induction"],"ans":"B","rat":"A Bishop score of 2 indicates a very unfavorable, unripe cervix. The cervix at 1 cm/30%/-3 after 4 hours of oxytocin has not progressed significantly \u2014 suggesting the cervix was not adequately ripened first. Prostaglandin agents (Cervidil, Cytotec) are used for cervical ripening to improve the Bishop score before or alongside oxytocin for induction to be effective. Doubling Pitocin (C) risks tachysystole. Emergency cesarean (D) is premature at 4 hours."},{"ch":"Ch 15","n":2,"stem":"A nurse is caring for a patient whose membranes have been ruptured for 26 hours. Temperature is 100.2\u00b0F. The nurse assesses the patient every hour. Two hours later, the temperature is 101.8\u00b0F, maternal HR is 118 bpm, and FHR is 174 bpm. What is the nurse's priority?","opts":["A. Administer acetaminophen and reassess temperature in 1 hour","B. Notify the HCP \u2014 these findings indicate chorioamnionitis requiring antibiotics and delivery","C. Obtain a urine culture \u2014 UTI is the most likely cause of fever in a postpartum patient","D. Apply a cooling blanket and increase IV fluid rate"],"ans":"B","rat":"Classic chorioamnionitis: prolonged ROM (\u226524 hrs = increased risk) + progressive fever + maternal tachycardia + FETAL tachycardia (often first sign of maternal infection). This requires immediate HCP notification, cultures, broad-spectrum antibiotics (Ampicillin + Gentamicin), and delivery. Treating the fever symptomatically (A) does not address the underlying infection. UTI (C) would not cause fetal tachycardia. Cooling blanket (D) is not a primary intervention."},{"ch":"Ch 15","n":3,"stem":"A nurse is preparing a patient for AROM. The fetal head is at -2 station. Which action is MOST important before proceeding?","opts":["A. Confirm a reactive NST has been completed in the past hour","B. Question the provider about the safety of AROM at this station due to elevated cord prolapse risk","C. Obtain consent for possible emergency cesarean","D. Increase the Pitocin to ensure contractions are adequate before AROM"],"ans":"B","rat":"The greatest risk of AROM is cord prolapse, and this risk is highest when the presenting part is NOT well engaged (high station). At -2 station, the head is 2 cm above the ischial spines \u2014 poorly engaged. The nurse should question the provider because this significantly increases cord prolapse risk. The NST (A) may have been done but is not the most critical safety concern in this scenario. Consent (C) is important but not THE priority here. Increasing Pitocin before AROM (D) is not indicated."},{"ch":"Ch 15","n":4,"stem":"A patient is in labor at 36 weeks. The provider orders misoprostol (Cytotec) for cervical ripening. Upon reviewing the chart, the nurse notes the patient had a low transverse cesarean section 3 years ago. What is the nurse's appropriate response?","opts":["A. Administer as ordered \u2014 low transverse scar is not a contraindication to misoprostol","B. Hold the medication and notify the provider \u2014 misoprostol is contraindicated with any previous cesarean incision","C. Administer at half the ordered dose to reduce rupture risk","D. Call pharmacy to clarify the dose \u2014 misoprostol dosing varies by gestational age"],"ans":"B","rat":"The slides explicitly state misoprostol (Cytotec) is CONTRAINDICATED with 'previous C-section or previous major uterine surgery' \u2014 this includes low transverse as well as classical incisions. The risk is uterine rupture from tachysystole caused by prostaglandins against a uterine scar. The nurse must hold and notify. Administering a reduced dose (C) is still administering a contraindicated drug. Dose clarification (D) is not the issue \u2014 the contraindication is."},{"ch":"Ch 15","n":5,"stem":"During ECV at 38 weeks, the nurse monitors the FHR and notes it changes from 148 to 162 bpm during the manipulation, then returns to 150 bpm when the manipulation pauses. The nurse's best action is:","opts":["A. Call an immediate halt to the procedure \u2014 this indicates cord entanglement","B. Document the finding and continue monitoring \u2014 transient FHR changes during ECV are expected","C. Initiate LION PIT \u2014 this is a non-reassuring FHR change","D. Prepare for emergency cesarean \u2014 fetal compromise has occurred"],"ans":"B","rat":"The slides state: 'Changes to FHR common, but usually return to normal' during ECV. A transient increase to 162 bpm that resolves when manipulation stops is an EXPECTED finding of the procedure. The nurse documents and continues monitoring. If the FHR did not return to baseline, or if there was sustained bradycardia or other concerning patterns, the procedure would be halted. LION PIT and emergency cesarean are not indicated for transient, self-resolving FHR changes during ECV."},{"ch":"Ch 15","n":6,"stem":"A nurse receives a patient transferred from the OR after an unplanned cesarean for non-reassuring FHR. The patient received general anesthesia. The nurse's PRIORITY assessment on arrival to the recovery unit is:","opts":["A. Fundal firmness and lochia","B. Respiratory rate and oxygen saturation","C. Level of consciousness","D. Abdominal incision and dressing"],"ans":"B","rat":"After GENERAL anesthesia (not spinal/epidural), the priority concern is respiratory depression from anesthetic agents. Respiratory assessment (rate and O2 sat) is the priority because airway/breathing takes precedence over all other assessments. The slides identify 'increased risk of respiratory depression due to narcotics in anesthesia' as the first specific post-c-section concern. All other assessments follow."},{"ch":"Ch 15","n":7,"stem":"A multiparous patient delivers and the placenta is delivered 5 minutes later. The nurse prepares to administer oxytocin as ordered. What is the PRIMARY reason oxytocin is given immediately after placental delivery?","opts":["A. To relieve afterpains from uterine contraction","B. To maintain uterine contraction and compress blood vessels at the placental site to prevent hemorrhage","C. To stimulate milk ejection in breastfeeding mothers","D. To prevent uterine inversion in the 3rd stage"],"ans":"B","rat":"Oxytocin given in the 3rd stage (early \u2014 'early prophylactic oxytocin IV during 3rd stage' from Ch 18 slides) promotes uterine contraction, which compresses the blood vessels at the site where the placenta detached. Without this contraction, the open vessels bleed freely = postpartum hemorrhage. Afterpains (A) are a side effect. Milk ejection (C) is a secondary oxytocin effect. Uterine inversion is caused by excessive cord traction (D), not prevented by oxytocin."},{"ch":"Ch 15","n":8,"stem":"A patient in the second stage of labor has been pushing for 3 hours. The fetal head is at +2 station. The provider offers the patient a choice between vacuum-assisted delivery or continued pushing. As the nurse, you know vacuum delivery requires which of the following? Select the ONE REQUIREMENT that has NOT been met based on the available information.","opts":["A. Cervix completely dilated \u2014 MET (pushing in 2nd stage = must be fully dilated)","B. Fetal head at +2 station or lower \u2014 MET (+2 station confirmed)","C. Known fetal position \u2014 cannot confirm this is met from the information given","D. Membranes ruptured \u2014 MET (required for 2nd stage)"],"ans":"C","rat":"Vacuum delivery requires: complete dilation, ROM, fetal head at +2 or lower, adequate anesthesia, empty bladder, AND known fetal position. Without knowing the exact fetal position (e.g., OA, OP, OT), the vacuum cannot be safely placed on the correct area of the fetal head. The other three requirements ARE confirmed. This requires the nurse to recognize what is MISSING from available information."},{"ch":"Ch 15","n":9,"stem":"A nurse is documenting pushing instructions she provided to a patient. Which documented teaching point is INCORRECT and should be corrected?","opts":["A. 'Instructed patient to begin pushing only when a contraction starts'","B. 'Instructed patient to push continuously between contractions to maintain progress'","C. 'Instructed patient to curl chin to chest and push as if having a bowel movement'","D. 'Instructed patient to rest and breathe normally between contractions'"],"ans":"B","rat":"Pushing between contractions is INCORRECT. Effective pushing occurs WITH contractions \u2014 the contraction provides the uterine force. Pushing between contractions wastes maternal energy, does not advance the fetus, and leads to faster fatigue. The correct 6-step technique from the slides: wait for a contraction, cleansing breath, bear down, push 6\u20138 sec, repeat during contraction, REST between contractions. Options A, C, and D are all correct teaching points."},{"ch":"Ch 15","n":10,"stem":"A nurse is assessing a neonate born via vacuum extraction. The baby has a soft fluctuant swelling at the top of the skull that WAS present immediately at birth, does NOT cross the sagittal suture line, and the infant's vital signs are stable. What is this finding?","opts":["A. Caput succedaneum \u2014 crosses suture lines, present at birth, benign","B. Cephalohematoma \u2014 does NOT cross suture lines, develops post-delivery from subperiosteal bleeding","C. Subgaleal hemorrhage \u2014 emergency requiring immediate intervention","D. Normal molding from the birth process"],"ans":"B","rat":"The critical differentiators: NOT crossing suture lines (distinguishes from caput AND subgaleal), and present immediately at birth but the description says it's subperiosteal (cephalohematoma). Note the question says the swelling was present at birth but does NOT cross suture lines and vital signs are stable. This is cephalohematoma. Caput crosses suture lines and is present at birth. Subgaleal crosses suture lines AND causes hemodynamic instability. Monitor for hyperbilirubinemia (cephalohematoma risk)."},{"ch":"Ch 15","n":11,"stem":"A Rh-negative patient undergoes ECV at 38 weeks. The procedure is technically successful and the baby is now vertex. What medication must the nurse anticipate administering?","opts":["A. Betamethasone \u2014 to accelerate fetal lung maturity after the stressful procedure","B. RhoGAM (Rh immune globulin) \u2014 due to risk of fetal blood entering maternal circulation during ECV","C. Terbutaline \u2014 to maintain uterine relaxation post-ECV","D. Oxytocin \u2014 to initiate labor now that the baby is vertex"],"ans":"B","rat":"During ECV, fetal blood may enter the maternal circulation (fetomaternal hemorrhage). If the mother is Rh-negative, she can become sensitized to Rh-positive fetal blood cells. RhoGAM is given AFTER ECV to Rh-negative mothers to prevent sensitization. Betamethasone (A) is for preterm lung maturity (<34 wks). Terbutaline (C) is given BEFORE ECV to relax the uterus. Oxytocin (D) is not indicated merely because version succeeded."},{"ch":"Ch 15","n":12,"stem":"A patient at 38 weeks is being induced for gestational hypertension. She is currently on Pitocin 12 mU/min with contractions q3 min \u00d7 70 sec. A new order is received to insert a Foley catheter. The nurse's MOST appropriate action before inserting the catheter is:","opts":["A. Stop the Pitocin while inserting the Foley \u2014 simultaneous procedures are unsafe","B. Assess the FHR and uterine activity before proceeding with catheter insertion","C. Insert the Foley immediately \u2014 bladder emptying is required before delivery","D. Request a bladder scan first \u2014 Foley is not needed if residual volume is <100 mL"],"ans":"B","rat":"Before any procedure in a laboring patient on Pitocin, the nurse should ensure the FHR and uterine activity are reassuring. A catheter insertion can cause pain, position changes, and vagal responses that can affect FHR and maternal stability. The nurse should assess baselines, ensure fetal well-being, then proceed. This reflects the nursing process (Assessment before intervention). Stopping Pitocin is not routinely required for catheter insertion."},{"ch":"Ch 15","n":13,"stem":"During a time-out before a scheduled cesarean, a team member states: 'I don't think we need to go over this \u2014 we all know this patient.' The nurse's MOST appropriate response is:","opts":["A. Agree and proceed \u2014 the surgical team knows the patient well","B. Firmly state that the full time-out must be completed \u2014 it is a required safety protocol that cannot be waived","C. Complete the time-out independently and document that it was done","D. Note the objection and defer to the attending physician's judgment"],"ans":"B","rat":"A surgical time-out is a NON-NEGOTIABLE safety protocol. All team members must participate and verify: correct patient, correct procedure, correct site, consents, and each member identifies themselves and their role. Familiarity with the patient is never a reason to skip a time-out \u2014 most wrong-site and wrong-patient errors occur in familiar settings where teams feel overconfident. The nurse has a professional and legal obligation to advocate for this safety step."},{"ch":"Ch 15","n":14,"stem":"A patient just had an AROM performed. Immediately after the procedure, the nurse assesses the FHR and notes a deceleration to 88 bpm that lasts 90 seconds before returning to baseline. The fluid is clear. The most appropriate IMMEDIATE action is:","opts":["A. Document as a variable deceleration \u2014 this is expected after AROM","B. Perform a vaginal exam to rule out cord prolapse","C. Prepare for emergency cesarean \u2014 this indicates uterine rupture","D. Administer terbutaline immediately"],"ans":"B","rat":"Any FHR deceleration IMMEDIATELY after ROM or AROM requires a vaginal exam to rule out cord prolapse \u2014 the most dangerous immediate complication of AROM. The deceleration to 88 bpm for 90 seconds represents a prolonged deceleration, not a normal variable deceleration. The fluid being clear is reassuring but does not rule out cord prolapse. The vaginal exam takes priority over other interventions. This is directly from the slides: 'Assess FHR immediately after AROM... if abnormal do vaginal exam to assess for cord prolapse.'"},{"ch":"Ch 15","n":15,"stem":"A patient is on Pitocin at 16 mU/min in 0.9% NS (isotonic) with contractions q3 min. The nurse now hangs a new bag and realizes it is D5W (hypotonic). What is the nurse's priority action?","opts":["A. Continue the infusion \u2014 the concentration is the same regardless of the solution","B. Slow the Pitocin rate to compensate for the hypotonic solution","C. Stop the infusion, hang the correct isotonic solution, and notify the HCP","D. Monitor for signs of water intoxication and continue at the same rate"],"ans":"C","rat":"Pitocin MUST be diluted in an isotonic solution. Hypotonic solution (D5W) with Pitocin = increased risk of water intoxication (dilutional hyponatremia) because: (1) hypotonic solution itself causes fluid shift into cells, and (2) oxytocin has antidiuretic properties causing water retention. The nurse must stop the infusion immediately, hang the correct solution, and notify the HCP. Continuing with D5W at any rate (A, B, D) puts the patient at risk."},{"ch":"Ch 16","n":1,"stem":"A primigravida at 40 weeks has been in active labor for 14 hours. Her cervix has been at 5 cm for 4 hours despite adequate contractions q3 min \u00d7 70 sec. The provider diagnoses secondary arrest. The nurse anticipates which intervention?","opts":["A. Immediate cesarean \u2014 secondary arrest always requires surgical delivery","B. Amniotomy (AROM) and/or increased Pitocin \u2014 to address the problem of Powers","C. Terbutaline to stop contractions and allow cervix to rest","D. ECV to change fetal position"],"ans":"B","rat":"Secondary arrest = cervical dilation slows or stops due to inadequate contractions (Powers problem). Management: maternal positioning, amniotomy (AROM \u2014 can strengthen contractions), and oxytocin (Pitocin) augmentation to improve uterine activity. Cesarean is not the first step (A). Terbutaline would STOP contractions (C) \u2014 the opposite of what is needed for weak contractions. ECV is for malpresentation, not arrest of labor (D)."},{"ch":"Ch 16","n":2,"stem":"A patient at 34 weeks develops preterm labor. Indomethacin is ordered. The nurse reviews the fetal ultrasound from 2 days ago showing an AFI of 4 cm. What is the nurse's MOST important concern regarding this order?","opts":["A. Indomethacin should not be used before 28 weeks","B. Indomethacin can cause further reduction in amniotic fluid (oligohydramnios) and constriction of the ductus arteriosus \u2014 the current low AFI increases this concern","C. Indomethacin is contraindicated with maternal diabetes","D. Indomethacin should only be given IV, not orally"],"ans":"B","rat":"Indomethacin (prostaglandin synthesis inhibitor) fetal adverse effects: constriction of the ductus arteriosus, pulmonary HTN, and OLIGOHYDRAMNIOS. With an existing AFI of 4 cm (normal \u22655 cm \u2014 <5 cm = oligohydramnios), administering indomethacin would likely worsen the already-low amniotic fluid. The nurse should hold the medication and notify the provider of this contraindication/concern. Age restriction (A) is not the primary concern here. Diabetes is not a contraindication (C). It can be given PO or rectally (D)."},{"ch":"Ch 16","n":3,"stem":"During management of shoulder dystocia, the provider instructs the nurse to apply fundal pressure. The nurse's CORRECT response is:","opts":["A. Apply firm downward pressure on the fundus as instructed \u2014 this is an emergency","B. Clarify the order \u2014 fundal pressure is CONTRAINDICATED in shoulder dystocia and worsens impaction","C. Apply the pressure gently since firm pressure can cause uterine rupture","D. Apply suprapubic pressure instead without clarifying"],"ans":"B","rat":"Fundal pressure is ABSOLUTELY CONTRAINDICATED in shoulder dystocia. It drives the anterior shoulder deeper into the symphysis pubis, worsening the impaction and potentially causing uterine rupture. SUPRAPUBIC pressure (above the pubic bone, downward) is what dislodges the shoulder. This is a critical distinction. The nurse must advocate for the patient by clarifying/refusing the harmful order, even in an emergency. Silently substituting suprapubic pressure (D) without communication is also inappropriate."},{"ch":"Ch 16","n":4,"stem":"A patient at 31 weeks has PPROM confirmed by sterile speculum, Nitrazine, and fern tests. She has no contractions, no signs of infection, and the fetal presentation is cephalic. What is the expected management approach?","opts":["A. Immediate induction with Pitocin \u2014 all PPROM patients should be delivered immediately","B. Expectant management weighing infection risk against neonatal prematurity risks, with prophylactic antibiotics","C. Cervidil placement for cervical ripening \u2014 delivery at 32 weeks","D. Misoprostol induction \u2014 prostaglandins are safe after PPROM"],"ans":"B","rat":"At 31 weeks, PPROM management: weigh the risk of maternal/neonatal infection against the significant risks of prematurity at 31 weeks. Expectant management with prophylactic antibiotics is the standard approach to prolong the pregnancy while monitoring closely for infection signs. Immediate delivery (A) ignores the severe prematurity risk. Misoprostol (D) is contraindicated if there is a prior uterine scar \u2014 but also, this scenario calls for expectant management, not immediate delivery."},{"ch":"Ch 16","n":5,"stem":"A nurse is caring for a patient with uterine rupture who is being stabilized for emergency cesarean. The nurse assesses: absent bowel sounds, shoulder pain, absent FHR, and the abdomen is board-like. The patient states, 'The pain suddenly STOPPED \u2014 I feel better.' How should the nurse interpret the relief of pain?","opts":["A. A positive sign \u2014 conservative measures are working","B. An ominous sign \u2014 cessation of pain with cessation of contractions indicates the uterus has lost structural integrity and stopped contracting","C. Expected \u2014 epidural block is now complete","D. Indicates the fetus has descended into the pelvis, relieving pressure"],"ans":"B","rat":"In uterine rupture, the sudden cessation of pain is an OMINOUS sign, not improvement. The uterine wall tears \u2014 it can no longer contract effectively, so the constant contraction pain stops. This 'false relief' coincides with cessation of contractions, absent FHR, hypovolemic shock developing, and possible extrusion of fetus. The slides identify 'cessation of ctx' as a key sign of uterine rupture. This requires emergency c-section + hysterectomy if large rupture."},{"ch":"Ch 16","n":6,"stem":"A patient at 29 weeks with preterm labor is ordered magnesium sulfate. Her most recent assessment: RR 14, DTRs 2+, UO 38 mL/hr, serum magnesium level 2.5 mEq/L (therapeutic). The nurse should:","opts":["A. Stop the infusion \u2014 therapeutic levels indicate imminent toxicity","B. Continue the infusion at the ordered rate \u2014 all parameters are within safe limits","C. Administer calcium gluconate \u2014 the DTRs are about to disappear","D. Reduce the rate by half \u2014 therapeutic level means the goal has been reached and less is needed"],"ans":"B","rat":"All parameters are within safe limits: RR \u226512 (14 = safe), DTRs 2+ (present = safe; toxicity = absent DTRs), UO \u226530 mL/hr (38 = safe). Therapeutic magnesium level = the drug is working at the right concentration \u2014 continue as ordered. Toxicity parameters: RR <12, absent DTRs, UO <30 mL/hr. Calcium gluconate (C) is the antidote \u2014 only given when toxicity signs are present. Reducing the rate (D) based on therapeutic level is not standard practice."},{"ch":"Ch 16","n":7,"stem":"A G5P4 patient is in active labor at 7 cm. She tells the nurse, 'I know what I'm doing \u2014 I've done this 4 times. I don't need any of your teaching.' The nurse recognizes which 4th P dysfunctional labor factor may be present and the appropriate response?","opts":["A. Powers \u2014 augment with oxytocin","B. Psyche \u2014 validate her experience while ensuring she has information about when and how to push effectively","C. Passage \u2014 assess for full bladder","D. Passenger \u2014 assess fetal position"],"ans":"B","rat":"The 4th P = Psyche = perceived threat, fear, or anxiety that interferes with normal labor. Here, the patient's dismissal of teaching may reflect anxiety disguised as confidence, fear of losing control, or genuine need for limited intervention. The nurse validates her experience (respecting autonomy) while ensuring critical information about pushing technique is available when needed. Grand multiparity (G5P4) also has elevated hemorrhage risk \u2014 the nurse should not disengage from monitoring while respecting the patient's autonomy."},{"ch":"Ch 16","n":8,"stem":"A nurse is caring for a patient with a complete cord prolapse. A gloved hand is maintaining elevation of the presenting part. Transfer to the OR is in progress. The patient screams, 'Let go \u2014 you're hurting me!' What is the nurse's best response?","opts":["A. Remove the hand to relieve the patient's discomfort","B. Administer IV morphine for pain relief while maintaining manual elevation","C. Explain simply that the hand must remain in place to protect the baby, and that relief will come once the baby is delivered","D. Ask the patient to push so the baby delivers faster"],"ans":"C","rat":"Manual elevation of the presenting part must be MAINTAINED CONTINUOUSLY until delivery. Removing the hand (A) would restore cord compression and cause rapid fetal oxygen deprivation. The slides specifically state: 'Consider patient's anxiety and explain in simple terms what is happening.' Compassionate, clear communication while maintaining the physical intervention is the correct approach. Morphine (B) requires an order and time the patient may not have. Pushing (D) is contraindicated \u2014 it would worsen compression."},{"ch":"Ch 16","n":9,"stem":"A patient at 30 weeks develops tachysystole (7 contractions in 10 minutes) while receiving Pitocin for PTL management. The FHR is 155 with moderate variability and no decelerations. Select the nurse's PRIORITY action:","opts":["A. Continue monitoring since the FHR is reassuring","B. Stop or decrease the Pitocin \u2014 intervention is required for tachysystole even when FHR is currently stable","C. Administer terbutaline immediately \u2014 FHR stability means tocolytic is the next step","D. Notify HCP and await orders before doing anything"],"ans":"B","rat":"The slides state explicitly: 'Intervention needed even if FHR is stable' with tachysystole. Tachysystole reduces uterine blood flow \u2014 the FHR may be reassuring NOW but the situation will worsen if not addressed. Stop/reduce Pitocin is the FIRST action, not waiting for HCP orders (D) or going straight to terbutaline (C \u2014 that comes after stopping Pitocin and repositioning). This tests the concept that normal FHR does not eliminate the need to address tachysystole."},{"ch":"Ch 16","n":10,"stem":"A patient delivered 3 weeks ago at 33 weeks after PPROM. She is now readmitted with fever, foul lochia, and uterine tenderness. Her uterus is larger than expected for 3 weeks postpartum. What is the most likely diagnosis?","opts":["A. Normal involution \u2014 uterus is expected to be palpable for up to 6 weeks","B. Endometritis with possible retained placental fragments causing subinvolution and late PPH","C. Mastitis \u2014 fever and pelvic findings unrelated","D. DVT \u2014 fever is caused by thrombus formation"],"ans":"B","rat":"Fever + foul lochia + uterine tenderness + subinvolution (uterus larger than expected) 3 weeks postpartum = endometritis, possibly with retained placental fragments (which prevent full involution and cause prolonged bleeding). Late PPH is defined as occurring after 24 hours up to 6 weeks. Retained tissue + infection = subinvolution. Management: pelvic ultrasound, cultures, IV antibiotics, possible D&C. Mastitis (C) presents with breast findings. DVT (D) presents with leg findings."},{"ch":"Ch 16","n":11,"stem":"A patient at 36 weeks is admitted with preterm labor. She has class III cardiac disease. Which tocolytic is CONTRAINDICATED for this patient?","opts":["A. Magnesium sulfate","B. Nifedipine (Procardia)","C. Terbutaline (Brethine)","D. Betamethasone"],"ans":"C","rat":"Terbutaline is CONTRAINDICATED in patients with cardiac disease (also: poorly controlled diabetes, hyperthyroidism, hypertension) due to risk of worsening cardiovascular status. Terbutaline causes maternal and fetal tachycardia and can precipitate cardiac arrhythmias in patients with underlying cardiac conditions. Magnesium sulfate and nifedipine have different contraindication profiles. Betamethasone is not a tocolytic \u2014 it's a corticosteroid for lung maturity."},{"ch":"Ch 16","n":12,"stem":"A provider orders corticosteroids for a patient at 35 weeks with preterm labor. The nurse reviews the order: 'Betamethasone 12 mg IM now and in 24 hours.' The patient receives the first dose. Six hours later, the patient delivers precipitously. What does the nurse know about the effectiveness of the corticosteroid course?","opts":["A. Maximum benefit was achieved \u2014 one dose is sufficient","B. Maximum benefit was NOT achieved \u2014 delivery should occur at least 24 hours after the COMPLETED course (both doses)","C. The benefit is irrelevant since the baby is delivered","D. One dose provides 50% of the benefit \u2014 adequate for 35 weeks"],"ans":"B","rat":"The slides state: 'The maximum benefit is generally achieved when delivery of fetus occurs at least 24 hours after the COMPLETION of the corticosteroid course (2 doses).' With only 6 hours since the first dose, neither the course is complete (second dose not given) nor has sufficient time elapsed. The neonatology team should be notified that the full course was not completed. While some benefit may still occur from partial exposure, maximum benefit was not achieved."},{"ch":"Ch 16","n":13,"stem":"A patient with previous uterine rupture is pregnant again at 32 weeks. The nurse is reviewing her care plan. Which finding would require the MOST urgent notification of the provider?","opts":["A. Contractions q10 min lasting 30 sec","B. Sudden severe abdominal pain with cessation of contractions that were previously q5 min","C. Braxton-Hicks contractions noted on tocometer","D. Fetal movement count of 12 in 1 hour"],"ans":"B","rat":"A patient with previous uterine rupture is at extremely high risk for recurrent rupture. The signs described \u2014 sudden severe pain + cessation of regular contractions \u2014 are classic uterine rupture signs. The slides list: 'Abdominal pain and tenderness + cessation of ctx.' This requires the most urgent response. Mild contractions (A), Braxton-Hicks (C), and normal fetal movement (D) are not emergencies."},{"ch":"Ch 16","n":14,"stem":"A patient at 27 weeks is receiving magnesium sulfate. The nurse assesses DTRs and finds them absent. Respiratory rate is 11/min. Urine output is 28 mL/hr. What is the nurse's correct sequence of actions?","opts":["A. Stop MgSO4 \u2192 administer calcium gluconate \u2192 notify HCP \u2192 increase IV rate","B. Notify HCP \u2192 stop MgSO4 \u2192 administer calcium gluconate","C. Administer calcium gluconate \u2192 stop MgSO4 \u2192 notify HCP","D. Stop MgSO4 \u2192 notify HCP \u2192 administer calcium gluconate as ordered"],"ans":"A","rat":"Three toxicity indicators exceeded simultaneously (absent DTRs, RR <12, UO <30). The nurse must act immediately: (1) STOP the infusion \u2014 remove the causative agent first, (2) ADMINISTER calcium gluconate \u2014 the antidote, (3) NOTIFY HCP. In actual practice, all three happen nearly simultaneously, but stopping the infusion is the absolute first physical action. The antidote can be given under nursing standing orders in many facilities. Waiting for HCP notification before stopping the infusion or giving the antidote wastes critical time."},{"ch":"Ch 16","n":15,"stem":"A patient in preterm labor at 32 weeks is being managed with tocolytics and betamethasone. The cervical length is 1.5 cm. The fFN was obtained and is positive. A nursing student asks: 'Does a positive fFN mean she will definitely deliver this week?' The nurse's best response is:","opts":["A. 'Yes \u2014 a positive fFN confirms imminent preterm delivery'","B. 'No \u2014 positive fFN has many false positives and is not reliable as a positive predictor. The fFN is most valuable when it is NEGATIVE, reliably indicating delivery is unlikely in the next 1\u20132 weeks'","C. 'Yes \u2014 combined with the short cervix, positive fFN confirms delivery within 48 hours'","D. 'No \u2014 fFN is not used clinically and has no predictive value'"],"ans":"B","rat":"fFN is a NEGATIVE predictor \u2014 its greatest clinical value is when negative (reliably predicts preterm birth will NOT occur in the next 1\u20132 weeks). A positive fFN has many false positives and does NOT confirm imminent delivery. The short cervix adds risk, but even combined with a positive fFN does not guarantee delivery within a specific timeframe. This distinction is directly from the slides and is a high-yield NCLEX concept."},{"ch":"Ch 17","n":1,"stem":"A nurse palpates the fundus of a postpartum patient on day 2 and finds it midline, firm, and 2 cm below the umbilicus. The lochia is pink-tinged and moderate. What is the nurse's interpretation?","opts":["A. Subinvolution \u2014 the fundus should be much lower by day 2","B. Normal findings \u2014 fundal position and lochia are both within expected range for postpartum day 2","C. Uterine atony \u2014 the fundus should be firm only after massage","D. Possible retained placental fragments \u2014 the lochia should be alba by day 2"],"ans":"B","rat":"Day 2 fundal position: starts at umbilicus at 12 hrs, descends 1 cm/day. By day 2: approximately 2 cm below umbilicus = NORMAL. Fundus is firm = no atony. Lochia on day 2: transitioning from rubra to serosa (pink-tinged) = NORMAL (lochia serosa is days 4\u201310; transition begins around days 2\u20133). All findings are within expected range. Subinvolution (A) = fundus remains HIGH, not descending normally."},{"ch":"Ch 17","n":2,"stem":"A postpartum patient calls the nurse and says, 'I just stood up and my pad looks soaked in blood. Is this normal?' The nurse assesses: fundus firm, midline, 1 cm below umbilicus. Lochia rubra moderate. What is the most accurate response?","opts":["A. 'This is concerning \u2014 I'll notify the provider immediately of postpartum hemorrhage'","B. 'This is expected \u2014 lochia pools when lying down and rushes out with position change due to gravity'","C. 'You should remain in bed to prevent further bleeding'","D. 'This indicates the uterus has become boggy \u2014 I need to massage your fundus'"],"ans":"B","rat":"The slides specifically address this: 'Lochia flow increases when first getting up or sitting up because of gravity.' When a patient has been lying down, blood pools in the vagina and rushes out with position change. This is NOT hemorrhage if the fundus is firm, midline, and the overall lochia amount is appropriate. The fundus is firm = no atony. A 'soaked pad with position change' in an otherwise stable patient with a firm fundus is a normal postpartum teaching point."},{"ch":"Ch 17","n":3,"stem":"A postpartum patient on day 1 has a temperature of 100.2\u00b0F. She had a vaginal delivery 18 hours ago, is not breastfeeding, and has no other signs of infection. What is the correct nursing interpretation?","opts":["A. This is likely infection \u2014 obtain blood cultures and notify the HCP","B. This is within the accepted range for the first 24 hours postpartum \u2014 caused by dehydration and leukocytosis, not infection","C. This indicates mastitis developing \u2014 assess breasts for redness and warmth","D. This is abnormal and requires immediate antipyretics and IV antibiotics"],"ans":"B","rat":"Temperature up to 100.4\u00b0F in the FIRST 24 hours postpartum is NORMAL \u2014 caused by dehydration (blood/fluid loss during delivery) and the normal postpartum leukocytosis (WBC up to 30,000 in early PP). The slide states: 'Temp of up to 100.4 is normal for first 24 hours due to dehydration (encourage fluids) and postpartum leukocytosis.' Only report to physician if >100.4\u00b0F, persists beyond 24 hours, or accompanied by other infection signs. Mastitis (C) typically presents on days 3\u20134 with breastfeeding."},{"ch":"Ch 17","n":4,"stem":"A nurse assesses a patient who is breastfeeding on postpartum day 3. The patient reports strong cramping pain with each nursing session, rating 7/10. The fundus is firm. What is the most appropriate nursing response?","opts":["A. Stop breastfeeding \u2014 the cramping indicates uterine rupture","B. Administer prescribed analgesics 30 minutes before breastfeeding and explain that afterpains are expected, especially in multiparas during breastfeeding","C. Massage the fundus \u2014 the cramping indicates the fundus is becoming boggy","D. Notify the HCP \u2014 severe afterpains are not normal and require evaluation"],"ans":"B","rat":"Afterpains are cramping from uterine contractions postpartum. They are WORSE in multiparas and MOST SEVERE during breastfeeding because oxytocin released for milk ejection stimulates strong uterine contractions. A firm fundus confirms the uterus is contracting appropriately \u2014 NOT a sign of rupture or atony. Management: timing analgesia (NSAIDs, opioids) before nursing sessions for pain control, and patient education. This is directly from the slides."},{"ch":"Ch 17","n":5,"stem":"A postpartum patient has not voided in 6 hours since delivery. The nurse palpates a distended bladder above the symphysis pubis. The fundus is displaced to the right and is 3 cm above the umbilicus. Lochia rubra is heavy. What is the nurse's correct priority sequence?","opts":["A. Massage fundus \u2192 assist to void \u2192 reassess","B. Notify HCP \u2192 administer oxytocin \u2192 massage fundus","C. Assist patient to void (or catheterize) \u2192 reassess fundal position and lochia","D. Administer Methergine \u2192 massage fundus \u2192 document findings"],"ans":"C","rat":"The chain: BLADDER DISTENSION \u2192 uterine displacement (to right) \u2192 uterine atony (prevents contraction) \u2192 hemorrhage (heavy lochia). The ROOT CAUSE is the full bladder. Correct sequence: empty the bladder first \u2192 then reassess fundus position and lochia. If the fundus is still displaced or boggy after bladder is emptied, then massage and notify HCP. Massaging a displaced fundus before emptying the bladder does not address the cause. This tests understanding of the bladder-uterus-hemorrhage chain."},{"ch":"Ch 17","n":6,"stem":"A patient on postpartum day 8 tells the nurse that she still has brown-tinged discharge. She is concerned something is wrong. What is the nurse's best response?","opts":["A. 'This is concerning \u2014 you should return for evaluation immediately'","B. 'This is expected \u2014 lochia serosa (pink to brown) is normal from days 4 to 10'","C. 'You should stop breastfeeding \u2014 it is causing the continued discharge'","D. 'You have an infection \u2014 the brown discharge indicates endometritis'"],"ans":"B","rat":"Lochia serosa: days 4\u201310, pink or brown-tinged, serosanguinous. On day 8, brown-tinged lochia is COMPLETELY EXPECTED and within the normal progression. The nurse should reassure the patient and explain the normal lochia progression: rubra (1\u20133) \u2192 serosa (4\u201310) \u2192 alba (11\u201314+). Concerning signs would be: return to bright red, foul odor, excessive clots, or complete cessation. Brown discharge on day 8 = lochia serosa = normal."},{"ch":"Ch 17","n":7,"stem":"A postpartum nurse overhears a new mother say, 'I feel like such a terrible mother \u2014 I can't get the baby to latch right and I want to cry every time I try.' It is postpartum day 3. What is the nurse's priority response?","opts":["A. Refer for immediate psychiatric evaluation \u2014 mood disruption indicates postpartum depression","B. Validate her feelings, provide encouragement and lactation support, and recognize this as taking-hold phase with normal self-critical behaviors","C. Advise her to switch to formula \u2014 breastfeeding is causing undue stress","D. Document the finding and notify the attending of possible postpartum depression"],"ans":"B","rat":"Taking-Hold phase (2\u201310 days): patient is ready to learn and take on mothering role but is often SELF-CRITICAL and needs encouragement. The slide states: 'Less dependent, but critical of her abilities. Needs encouragement.' Breastfeeding difficulties + tearfulness on day 3 + trying to be a good mother = taking-hold phase with postpartum blues (first week, does not impair infant care). The correct response is validation + support + practical help. Postpartum depression (A, D) requires symptoms persisting beyond 2 weeks that impair function."},{"ch":"Ch 17","n":8,"stem":"A nurse performs REEDA assessment on a patient's episiotomy on postpartum day 2. The nurse notes: R1 (mild redness), E2 (moderate edema), E0 (no ecchymosis), D0 (no discharge), A0 (edges well approximated). What is the nurse's priority intervention?","opts":["A. Notify the provider \u2014 REEDA score of 3 indicates wound infection","B. Apply ice pack, offer sitz bath, and prescribed topical anesthetics \u2014 this is within expected range for day 2","C. Obtain wound cultures \u2014 discharge may be developing","D. Prepare for surgical repair \u2014 the wound is separating"],"ans":"B","rat":"REEDA score 3 (R1+E2+E0+D0+A0 = 3): mild redness + moderate edema are expected after birth trauma, especially on day 2 when edema peaks. No discharge (D0) = no wound breakdown. No ecchymosis (E0). Edges approximated (A0) = wound intact. This is within expected range and does not indicate infection. Management is comfort measures: ice packs (first 24 hrs), sitz baths (after 24 hrs), topical anesthetics, NSAIDs. Provider notification is not warranted for mild redness + edema only."},{"ch":"Ch 17","n":9,"stem":"A postpartum patient on day 5 after cesarean birth reports that her abdomen 'feels gassy and bloated' and she cannot tolerate more than liquids. Bowel sounds are present but hypoactive. What is the most appropriate nursing intervention?","opts":["A. Notify the HCP \u2014 this indicates a bowel obstruction requiring emergency evaluation","B. Encourage early, frequent ambulation, simethicone as ordered, and avoid carbonated beverages and straws","C. Restrict all oral intake until bowel sounds are fully active","D. Administer an enema to stimulate bowel activity"],"ans":"B","rat":"Post-cesarean abdominal distension and delayed GI motility are expected from anesthesia, handling of abdominal organs during surgery, and postoperative immobility. Hypoactive bowel sounds on day 5 with gas/bloating but NO obstruction signs (absent sounds, vomiting, severe pain) = manageable with nursing interventions. The slides specify: early ambulation, abdominal/pelvic exercises, simethicone for gas, avoid carbonated beverages and straws. Restricting all oral intake (C) or enema (D) is not first-line nursing management."},{"ch":"Ch 17","n":10,"stem":"A nurse is conducting a postpartum assessment at 30 minutes after vaginal delivery. Which finding requires the MOST URGENT intervention?","opts":["A. Lochia rubra, moderate, fleshy odor","B. Fundus firm, midline, at umbilicus","C. Saturation of a full perineal pad in 15 minutes with a constant trickle","D. Temperature 99.8\u00b0F, HR 86 bpm"],"ans":"C","rat":"Saturating a pad in 15 minutes with a constant trickle = EXCESSIVE bleeding = PPH risk requiring IMMEDIATE attention. The slides define 'Excessive: saturated in 15 minutes.' A constant trickle or oozing requires immediate assessment. Lochia rubra moderate (A) = expected. Firm fundus at umbilicus (B) = expected. Mild temp elevation and HR 86 at 30 min post-delivery (D) = can indicate dehydration/exertion, not immediately urgent. The pad saturation (C) is the priority."},{"ch":"Ch 17","n":11,"stem":"A postpartum patient who is not breastfeeding asks when her menstrual period will return. The nurse's best response is:","opts":["A. 'Periods typically return in 6\u201310 weeks for non-breastfeeding mothers, but ovulation can occur BEFORE your first period returns'","B. 'You will not ovulate until after your first period \u2014 no contraception is needed until then'","C. 'Periods return at exactly 6 weeks postpartum for all patients'","D. 'Breastfeeding is the only method that reliably prevents ovulation after delivery'"],"ans":"A","rat":"Non-breastfeeding: menstruation typically returns 6\u201310 weeks postpartum. CRITICAL teaching point: ovulation can occur BEFORE menstruation returns. This means the patient can become pregnant before her first postpartum period. Contraception should be used when intercourse resumes. Statement B is INCORRECT and dangerous. Periods do not return at exactly 6 weeks for all patients (C). Exclusive breastfeeding suppresses ovulation but is not a reliable contraceptive (D)."},{"ch":"Ch 17","n":12,"stem":"A nurse is assessing a postpartum patient on day 1 who had a cesarean birth under spinal anesthesia 10 hours ago. She reports she still cannot feel her feet clearly. The nurse's MOST important action is:","opts":["A. Notify the HCP of a failed spinal \u2014 sensation should have returned within 2 hours","B. Assess the level and extent of sensory block and ensure fall prevention measures are in place before any attempt at ambulation","C. Assist the patient to ambulate immediately \u2014 early ambulation prevents DVT","D. Administer a reversal agent for the spinal block"],"ans":"B","rat":"Post-spinal anesthesia, 'return of motion' from the regional block must be assessed before ambulation (from the slides: 'Return of motion in regional block given' is a specific post-op assessment). At 10 hours, residual sensory effects are unusual but possible with dense blocks. The nurse assesses the level of remaining block and implements fall prevention. Early ambulation IS important for DVT prevention but CANNOT happen safely until adequate motor and sensory function has returned. There is no reversal agent for spinal anesthesia (D)."},{"ch":"Ch 17","n":13,"stem":"A patient on postpartum day 2 has WBC 26,000, temperature 98.9\u00b0F, HR 78, and is breastfeeding without difficulty. Her fundus is firm and midline. Lochia rubra is moderate with a fleshy odor. The nurse's best interpretation is:","opts":["A. Leukocytosis + breastfeeding = mastitis developing \u2014 assess breasts","B. All findings are normal \u2014 postpartum leukocytosis up to 30,000 is expected and does not indicate infection in the absence of other signs","C. Moderate lochia rubra on day 2 is abnormal \u2014 prepare for PPH management","D. WBC of 26,000 requires blood cultures \u2014 this level is not normal postpartum"],"ans":"B","rat":"WBC up to 30,000 postpartum = NORMAL (not infection). Temperature 98.9\u00b0F = normal. HR 78 = normal. Firm fundus, midline = normal involution. Lochia rubra moderate on day 2 = expected (rubra days 1\u20133). Fleshy odor = normal. ALL findings are within normal limits. This is a classic NCLEX distractor \u2014 students see WBC 26,000 and panic. The key is that postpartum leukocytosis is a documented physiologic response to labor that normalizes by day 6."},{"ch":"Ch 17","n":14,"stem":"A nurse is caring for a patient who just delivered her 5th baby (G5P5) after a prolonged labor of 22 hours. Which postpartum complication should the nurse monitor for MOST vigilantly?","opts":["A. Mastitis \u2014 grand multiparity increases milk supply complications","B. DVT \u2014 prolonged labor increases clot risk","C. Postpartum hemorrhage \u2014 grand multiparity and prolonged labor are both PPH risk factors","D. Wound infection \u2014 operative delivery increases infection risk"],"ans":"C","rat":"This patient has MULTIPLE PPH risk factors: grand multiparity (\u22655 = risk factor), prolonged labor (risk factor). The uterine muscle in a grand multipara is less responsive to oxytocin (desensitized from multiple pregnancies), predisposing to atony. Prolonged labor further fatigues the uterine muscle. The nurse must assess fundal tone, lochia, and vital signs with heightened vigilance. DVT (B) is also a concern but is not the most immediate postpartum risk in this scenario."},{"ch":"Ch 17","n":15,"stem":"A postpartum nurse is caring for a patient who delivered 2 hours ago. The patient asks, 'Can I get up and shower?' The nurse's assessment shows: VS stable, fundus firm and midline, lochia moderate rubra. What should the nurse do?","opts":["A. Tell the patient she must remain on bedrest for 8 hours post-delivery","B. Assist the patient to the bathroom, staying with her due to the risk of orthostatic hypotension and falls","C. Allow the patient to shower independently \u2014 stable VS indicate she is safe","D. Defer the shower until day 2 \u2014 activity is restricted in the first 24 hours"],"ans":"B","rat":"Early ambulation is encouraged postpartum (DVT prevention, GI motility, overall recovery). However, orthostatic hypotension is common postpartum and a fall risk is real. The correct action is ASSIST the patient and STAY WITH HER. The nurse does not leave a postpartum patient alone for first ambulation, especially with dizziness risk. Bedrest for 8 hours (A) is not routine for uncomplicated vaginal delivery. Allowing independent ambulation (C) at 2 hours without assessment is unsafe."},{"ch":"Ch 18","n":1,"stem":"A patient who delivered vaginally 2 hours ago received Pitocin infusion for 16 hours during labor. The nurse now assesses a boggy fundus at 2 cm above the umbilicus, soaking a pad every 10 minutes. The nurse massages the fundus and it firms temporarily then goes boggy again. The NEXT intervention after notifying the HCP is:","opts":["A. Administer methylergonovine (Methergine) IM \u2014 first-line uterotonic","B. Administer oxytocin (Pitocin) IV as ordered \u2014 first-line drug for uterine atony","C. Prepare for bimanual compression \u2014 massage has failed","D. Administer carboprost (Hemabate) IM \u2014 most potent uterotonic"],"ans":"B","rat":"The uterotonic escalation for PPH from atony: (1) Fundal massage \u2014 done. (2) Oxytocin (Pitocin) \u2014 FIRST LINE pharmacologic agent. (3) Methergine \u2014 second line (contraindicated in HTN). (4) Misoprostol rectal. (5) Carboprost \u2014 last resort before surgical. Methergine (A) is second-line, not first. Bimanual compression (C) is for when pharmacologic measures have failed. Carboprost (D) carries risk of pulmonary edema and is not first-line."},{"ch":"Ch 18","n":2,"stem":"A postpartum patient has a firm fundus and normal lochia on day 1. She rates perineal pain 9/10 and describes it as pressure and fullness. The nurse inspects the perineum and notes a 4\u00d75 cm tense, discolored, bulging mass near the left labia. BP is 94/60 and HR is 128 bpm. What is occurring?","opts":["A. Severe perineal edema \u2014 apply ice immediately","B. Vulvar hematoma with developing hypovolemic shock from concealed blood loss \u2014 notify HCP urgently","C. Normal perineal trauma from delivery \u2014 administer prescribed analgesics","D. Wound dehiscence \u2014 prepare for wound irrigation"],"ans":"B","rat":"FIRM fundus + NORMAL lochia + severe perineal pain/pressure + discolored bulging mass + hemodynamic instability (BP 94/60, HR 128) = vulvar hematoma with concealed hemorrhage causing hypovolemic shock. The blood accumulating in the connective tissue spaces is not visible in the lochia \u2014 it is CONCEALED. Hemodynamic instability confirms significant blood loss. This is an emergency requiring provider notification and possible surgical intervention. Perineal edema (A) does not cause hemodynamic compromise."},{"ch":"Ch 18","n":3,"stem":"A nurse is caring for a patient on postpartum day 6 after cesarean birth who develops a temperature of 102\u00b0F, productive cough, dyspnea, tachycardia, and O2 sat 91%. Left lower lobe crackles are auscultated. She has been relatively immobile since surgery. What is t
